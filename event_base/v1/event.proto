syntax = "proto3";
package event_base.v1;

import "google/protobuf/descriptor.proto";
// import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/event_base/v1;event_base";

message MessageEventConfig {
  string event_topic = 1;
}

extend google.protobuf.MessageOptions {
  MessageEventConfig event_config = 50001;
}

