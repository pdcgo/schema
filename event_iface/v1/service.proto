syntax = "proto3";
package event_iface.v1;

// import "buf/validate/validate.proto";
// import "google/protobuf/timestamp.proto";
import "stock_iface/v1/event.proto";

option go_package = "github.com/pdcgo/schema/services/event_iface/v1;event_iface";

service EventService {
  rpc Send(SendRequest) returns (SendResponse);
}

service PushService {
  rpc Push(PushRequest) returns (PushResponse);
}

message Event {
  stock_iface.v1.StockEvent stock = 1;
}

message SendRequest {}
message SendResponse {}

message PushRequest {}
message PushResponse {}
