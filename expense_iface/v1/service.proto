syntax = "proto3";
package expense_iface.v1;

option go_package = "github.com/pdcgo/schema/services/expense_iface/v1;expense_iface";

// ## Service untuk expense (skeleton — RPC surface designed later)
service ExpenseService {
  // Hello is a temporary skeleton RPC; replaced when the real expense RPCs are designed.
  rpc Hello(HelloRequest) returns (HelloResponse);
}

message HelloRequest {}

message HelloResponse {
  string message = 1;
}
