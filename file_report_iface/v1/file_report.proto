option go_package = "github.com/pdcgo/schema/services/file_report_iface/v1;file_report_iface";

service FileReportService {
  rpc AvailableReport(AvailableReportRequest) returns (AvailableReportResponse);
  rpc CreateReport(CreateReportRequest) returns (CreateReportResponse);
}

message CreateReportRequest {
  string name = 1;
  string query = 2;

  oneof variable {
    uint64 team_id = 3;
    uint64 warehouse_id = 4;
  }
}

message CreateReportResponse {
  string id = 1;
}

message AvailableReportRequest {}
message AvailableReportResponse {
  repeated string reports = 1;
}
