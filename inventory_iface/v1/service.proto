// --- Opname (stock-take) ---

message OpnameCreateRequest {
  uint64 team_id = 1;
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  string name = 3 [(buf.validate.field).string.min_len = 1];
}
message OpnameCreateResponse {
  uint64 opname_id = 1;
}

// OpnameList follows the flexible list convention (see docs/proto-guideline.md).
enum OpnameListDataType {
  OPNAME_LIST_DATA_TYPE_UNSPECIFIED = 0;
  OPNAME_LIST_DATA_TYPE_GENERAL = 1;
  OPNAME_LIST_DATA_TYPE_PROGRESS = 2;
}

enum OpnameGeneralSort {
  OPNAME_GENERAL_SORT_UNSPECIFIED = 0;
  OPNAME_GENERAL_SORT_CREATED = 1;
}

message OpnameListFilter {
  uint64 warehouse_id = 1;
  uint64 team_id = 2; // optional
  OpnameStatus status = 3; // optional
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
}

message OpnameListSort {
  common.v1.SortType sort_type = 1;
  oneof s {
    OpnameGeneralSort general = 2;
  }
}

message OpnameListRequest {
  OpnameListFilter filter = 1 [(buf.validate.field).required = true];
  OpnameListSort sort = 2;
  repeated OpnameListDataType data_types = 3 [(buf.validate.field).repeated.min_items = 1];
}

message OpnameGeneralItem {
  uint64 id = 1;
  string name = 2;
  OpnameStatus status = 3;
  uint64 created_by_id = 4;
  google.protobuf.Timestamp created_at = 5;
  uint64 completed_by_id = 6;
  google.protobuf.Timestamp completed_at = 7;
}
message OpnameGeneralData {
  map<uint64, OpnameGeneralItem> data = 1;
}

// Counting progress: total lines, lines counted, and counted lines whose
// counted value differs from the expected snapshot.
message OpnameProgressItem {
  int64 line_count = 1;
  int64 counted_count = 2;
  int64 discrepancy_count = 3;
}
message OpnameProgressData {
  map<uint64, OpnameProgressItem> data = 1;
}

message OpnameData {
  oneof data {
    OpnameGeneralData general = 1;
    OpnameProgressData progress = 2;
  }
}

message OpnameListResponse {
  repeated OpnameData data = 1;
  repeated uint64 ids = 2;
}

message OpnameDetailRequest {
  uint64 opname_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}

// One (rack, product) counting line. expected_count is the placement snapshot
// taken at session create; counted=false means not counted yet.
message OpnameLineItem {
  uint64 id = 1;
  uint64 rack_id = 2;
  string rack_name = 3;
  uint64 product_id = 4;
  string product_name = 5;
  int64 expected_count = 6;
  int64 counted_count = 7;
  bool counted = 8;
  OpnameReasonType reason = 9;
  string note = 10;
}

message OpnameDetailResponse {
  uint64 id = 1;
  uint64 team_id = 2;
  uint64 warehouse_id = 3;
  string name = 4;
  OpnameStatus status = 5;
  uint64 inventory_transaction_id = 6; // 0 until completed
  uint64 created_by_id = 7;
  google.protobuf.Timestamp created_at = 8;
  uint64 completed_by_id = 9;
  google.protobuf.Timestamp completed_at = 10;
  google.protobuf.Timestamp canceled_at = 11;
  repeated OpnameLineItem lines = 12;
}

// One counted quantity for a product on the rack being counted. reason/note are
// optional (why the count differs — lost/broken/disaster — plus free text).
message OpnameCountItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  int64 counted_count = 2 [(buf.validate.field).int64.gte = 0];
  OpnameReasonType reason = 3;
  string note = 4 [(buf.validate.field).string.max_len = 300];
}

// Batch count for ONE rack of a pending session. Re-counting overwrites. A
// product not in the seeded lines upserts a new line with expected_count 0
// (found-but-not-expected).
message OpnameLineCountRequest {
  uint64 opname_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 rack_id = 3 [(buf.validate.field).uint64.gt = 0];
  repeated OpnameCountItem items = 4 [(buf.validate.field).repeated.min_items = 1];
}
message OpnameLineCountResponse {}

message OpnameCompleteRequest {
  uint64 opname_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message OpnameCompleteResponse {
  uint64 transaction_id = 1; // the minted opname InventoryTransaction
}

message OpnameCancelRequest {
  uint64 opname_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message OpnameCancelResponse {}
