syntax = "proto3";
package inventory_iface.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "inventory_iface/v1/types.proto";
import "role_base/v1/role.proto";
import "warehouse_iface/v1/event.proto";
import "warehouse_iface/v1/inbound.proto";

option go_package = "github.com/pdcgo/schema/services/inventory_iface/v1;inventory_iface";

service InventoryService {
  rpc Order(OrderRequest) returns (OrderResponse);

  rpc StockMovement(StockMovementRequest) returns (StockMovementResponse);

  // PushStockEvent ingests a warehouse StockEvent (the RPC counterpart of the
  // Pub/Sub push handler) and applies it to inventory state in one transaction.
  rpc PushStockEvent(PushStockEventRequest) returns (PushStockEventResponse);

  // Transaction management: a request-driven, inventory-owned stock mutation
  // (order/restock/return/found_back/problem). TransactionCancel reverses one.
  rpc TransactionCreate(TransactionCreateRequest) returns (TransactionCreateResponse);
  rpc TransactionCancel(TransactionCancelRequest) returns (TransactionCancelResponse);

  rpc ProductPlacementList(ProductPlacementListRequest) returns (ProductPlacementListResponse);
  rpc ProductPlacementLog(ProductPlacementLogRequest) returns (ProductPlacementLogResponse);
  // PlacementMove moves stock between racks of ONE warehouse (multi-item, partial
  // counts). Net-zero for the warehouse: StockState/StockBatch are untouched; only
  // StockPlacement balances change, logged as MOVE placement-log pairs carrying note.
  rpc PlacementMove(PlacementMoveRequest) returns (PlacementMoveResponse);
  rpc ProductBatchList(ProductBatchListRequest) returns (ProductBatchListResponse);

  // untuk rekonsiliasi legacy
  rpc ProductReconcile(ProductReconcileRequest) returns (stream ProductReconcileResponse);

  // Rack management. All except RackList are scoped by warehouse_id.
  rpc RackCreate(RackCreateRequest) returns (RackCreateResponse);
  rpc RackUpdate(RackUpdateRequest) returns (RackUpdateResponse);
  rpc RackDelete(RackDeleteRequest) returns (RackDeleteResponse);
  rpc RackDetail(RackDetailRequest) returns (RackDetailResponse);
  rpc RackList(RackListRequest) returns (RackListResponse);
  // RackByIds bulk-loads racks by id (for preloading rack names in other UIs so raw
  // ids are never shown). Any authenticated caller; missing/deleted ids are omitted.
  rpc RackByIds(RackByIdsRequest) returns (RackByIdsResponse);
  // Rack Detail tabs (rack-scoped, all products): RackProductList = products currently
  // placed on the rack (with names + counts); RackHistory = the rack's placement log
  // across every product, with an optional time window.
  rpc RackProductList(RackProductListRequest) returns (RackProductListResponse);
  rpc RackHistory(RackHistoryRequest) returns (RackHistoryResponse);

  // Product management (config + views), scoped by warehouse_id.
  rpc ProductConfig(ProductConfigRequest) returns (ProductConfigResponse);
  rpc ProductConfigUpdate(ProductConfigUpdateRequest) returns (ProductConfigUpdateResponse);
  rpc ProductList(ProductListRequest) returns (ProductListResponse);
  rpc ProductDetail(ProductDetailRequest) returns (ProductDetailResponse);

  // Restock workflow documents. RestockCreate makes a PENDING document (no stock
  // effect); RestockUpdate{accept} mints the internal inventory transaction (stock
  // enters + StockBatch); cancel is pre-accept only. Scoped by warehouse_id.
  rpc RestockCreate(RestockCreateRequest) returns (RestockCreateResponse);
  rpc RestockUpdate(RestockUpdateRequest) returns (RestockUpdateResponse);
  rpc RestockDetail(RestockDetailRequest) returns (RestockDetailResponse);
  rpc RestockList(RestockListRequest) returns (RestockListResponse);
  // Audit trail of a restock document (created/edited/accepted/problem/canceled).
  rpc RestockLogList(RestockLogListRequest) returns (RestockLogListResponse);

  // Transfer stock between warehouses — two-legged, in-transit: TransferCreate applies
  // the OUT leg at the source (stock exits immediately); TransferAccept applies the IN
  // leg at the destination (stock enters + StockBatch); TransferCancel is pre-accept
  // only and restores the source.
  rpc TransferCreate(TransferCreateRequest) returns (TransferCreateResponse);
  rpc TransferCancel(TransferCancelRequest) returns (TransferCancelResponse);
  rpc TransferAccept(TransferAcceptRequest) returns (TransferAcceptResponse);
  rpc TransferDetail(TransferDetailRequest) returns (TransferDetailResponse);
  rpc TransferList(TransferListRequest) returns (TransferListResponse);

  // Opname (stock-take) sessions over a warehouse's racks, counted per
  // (rack, product) — the StockPlacement grain. OpnameCreate seeds a PENDING
  // session with expected counts snapshotted from the warehouse's placements;
  // OpnameLineCount records counted quantities (re-count overwrites, pending
  // only); OpnameComplete mints an InventoryTransaction and applies counted
  // values as ADJUSTMENT mutations (placements + stock state; uncounted lines
  // untouched); OpnameCancel is pre-complete only and applies nothing.
  rpc OpnameCreate(OpnameCreateRequest) returns (OpnameCreateResponse);
  rpc OpnameList(OpnameListRequest) returns (OpnameListResponse);
  rpc OpnameDetail(OpnameDetailRequest) returns (OpnameDetailResponse);
  rpc OpnameLineCount(OpnameLineCountRequest) returns (OpnameLineCountResponse);
  rpc OpnameComplete(OpnameCompleteRequest) returns (OpnameCompleteResponse);
  rpc OpnameCancel(OpnameCancelRequest) returns (OpnameCancelResponse);
}

// One product line in a transaction. price is the per-unit value.
message TransactionItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  int64 count = 2 [(buf.validate.field).int64.gt = 0];
  double price = 3;
}

// Five same-shaped transaction kinds (distinct types so they can diverge later).
message TransactionOrder {
  repeated TransactionItem items = 1 [(buf.validate.field).repeated.min_items = 1];
}
message TransactionRestock {
  repeated TransactionItem items = 1 [(buf.validate.field).repeated.min_items = 1];
}
message TransactionReturn {
  repeated TransactionItem items = 1 [(buf.validate.field).repeated.min_items = 1];
}
message TransactionFoundBack {
  repeated TransactionItem items = 1 [(buf.validate.field).repeated.min_items = 1];
}
message TransactionProblem {
  repeated TransactionItem items = 1 [(buf.validate.field).repeated.min_items = 1];
}

message TransactionCreateRequest {
  uint64 team_id = 1;
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  oneof tx {
    TransactionOrder order = 3;
    TransactionRestock restock = 4;
    TransactionReturn stock_return = 5;
    TransactionFoundBack found_back = 6;
    TransactionProblem problem = 7;
  }
}
// Per-item cost valuation of the mutation. For the ORDER kind this is the
// warehouse's average cost the stock-out was valued at (not the caller price) —
// the selling v3 order service derives cross-team product fees from it. Other
// kinds echo the caller-supplied price.
message TransactionCostItem {
  uint64 product_id = 1;
  int64 count = 2;
  double unit_cost = 3;
  double total_cost = 4;
}

message TransactionCreateResponse {
  uint64 transaction_id = 1;
  repeated TransactionCostItem items = 2;
}

message TransactionCancelRequest {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2;
}
message TransactionCancelResponse {}

message ProductReconcileRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message ProductReconcileResponse {
  string message = 1;
}

message ProductPlacementListRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 rack_id = 3;
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
}

message ProductPlacementItem {
  uint64 id = 1;
  uint64 product_id = 2;
  uint64 warehouse_id = 3;
  uint64 rack_id = 4;
  int64 count = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message ProductPlacementListResponse {
  repeated ProductPlacementItem placements = 1;
  common.v1.PageInfo page_info = 2;
}

message ProductPlacementLogRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 rack_id = 3;
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
  // Optional created_at window; epoch MICROseconds (time.UnixMicro, matching the
  // existing common.v1.TimeFilter consumers). Zero start/end = unbounded side.
  common.v1.TimeFilter time_range = 5;
}

message ProductPlacementLogItem {
  uint64 id = 1;
  uint64 product_id = 2;
  uint64 warehouse_id = 3;
  uint64 rack_id = 4;
  uint64 transaction_id = 5;
  uint64 user_id = 6;
  StockChangeType change_type = 7;
  int64 change = 8;
  int64 balance_count = 9;
  google.protobuf.Timestamp created_at = 10;
  string note = 11;
}

message ProductPlacementLogResponse {
  repeated ProductPlacementLogItem logs = 1;
  common.v1.PageInfo page_info = 2;
}

// One product move between two racks of the same warehouse (partial count).
message PlacementMoveItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 from_rack_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 to_rack_id = 3 [(buf.validate.field).uint64.gt = 0];
  int64 count = 4 [(buf.validate.field).int64.gt = 0];
}

message PlacementMoveRequest {
  uint64 warehouse_id = 1 [(buf.validate.field).uint64.gt = 0];
  repeated PlacementMoveItem placements = 2 [(buf.validate.field).repeated.min_items = 1];
  string note = 3;
}

message PlacementMoveResponse {}

message ProductBatchListRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message ProductBatchItem {
  uint64 id = 1;
  uint64 product_id = 2;
  uint64 warehouse_id = 3;
  uint64 inbound_id = 4;
  int64 start_count = 5;
  int64 end_count = 6;
  double price = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ProductBatchListResponse {
  repeated ProductBatchItem batches = 1;
  common.v1.PageInfo page_info = 2;
}

message PushStockEventRequest {
  warehouse_iface.v1.StockEvent event = 1 [(buf.validate.field).required = true];
}

message PushStockEventResponse {}

message StockMovementRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  common.v1.TimeFilter time_range = 5 [(buf.validate.field).required = true];
  common.v1.PageFilter page = 6 [(buf.validate.field).required = true];
}

message MovementTransactionInfo {
  uint64 transaction_id = 1;
  string receipt = 2;
  string team_name = 3;
  string team_code = 4;
  string user_username = 5;
  string user_name = 6;
}

message MovementItem {
  uint64 id = 1;
  uint64 product_id = 2;
  uint64 warehouse_id = 3;
  uint64 user_id = 4;
  uint64 transaction_id = 5;
  StockChangeType change_type = 6;
  int64 change = 7;
  double price = 8;
  int64 balance_count = 9;
  double balance_amount = 10;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp created_at = 11;
  // @gotags: gorm:"-"
  MovementTransactionInfo transaction_info = 12;
}

message StockMovementResponse {
  repeated MovementItem movements = 1;
  common.v1.PageInfoWithoutCount page_info = 2;
}

message ProvisionItem {
  uint64 product_id = 1;
  int64 count = 2;
}

message OrderRequest {
  uint64 team_id = 1;
  uint64 warehouse_id = 2;
  QueueType queue_type = 3;
  repeated ProvisionItem provisions = 4;
}

message ProvisionItemRes {
  uint64 product_id = 1;
  int64 count = 2;
  double price = 3;
  double amount = 4;
}

message OrderResponse {
  repeated ProvisionItemRes provisions = 3;
  double total = 5;
}

message HelloRequest {}
message HelloResponse {}

// --- Rack management ---

message RackCreateRequest {
  uint64 warehouse_id = 1 [(buf.validate.field).uint64.gt = 0];
  string name = 2 [(buf.validate.field).string.min_len = 1];
}
message RackCreateResponse {
  uint64 id = 1;
}

message RackUpdateRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  string name = 3 [(buf.validate.field).string.min_len = 1];
}
message RackUpdateResponse {}

message RackDeleteRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message RackDeleteResponse {}

message RackDetailRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message RackDetailResponse {
  uint64 id = 1;
  uint64 warehouse_id = 2;
  string name = 3;
  bool is_system = 4;
  int64 stock_count = 5;
  int64 product_count = 6;
  string warehouse_name = 7;
  google.protobuf.Timestamp created_at = 8;
}

// Rack Detail "Products" tab: the products currently placed on a rack (count > 0).
message RackProductListRequest {
  uint64 rack_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}
message RackProductItem {
  uint64 product_id = 1;
  string product_name = 2;
  int64 count = 3;
}
message RackProductListResponse {
  repeated RackProductItem items = 1;
  common.v1.PageInfo page_info = 2;
}

// Rack Detail "Histories" tab: the rack's placement log across every product, with an
// optional created_at window (time_range is epoch MICROseconds; zero side = unbounded).
message RackHistoryRequest {
  uint64 rack_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
  common.v1.TimeFilter time_range = 4;
}
message RackHistoryItem {
  uint64 id = 1;
  uint64 product_id = 2;
  string product_name = 3;
  StockChangeType change_type = 4;
  int64 change = 5;
  int64 balance_count = 6;
  uint64 user_id = 7;
  uint64 transaction_id = 8;
  string note = 9;
  google.protobuf.Timestamp created_at = 10;
}
message RackHistoryResponse {
  repeated RackHistoryItem items = 1;
  common.v1.PageInfo page_info = 2;
}

// RackList follows the flexible list convention (see docs/proto-guideline.md).
enum RackListDataType {
  RACK_LIST_DATA_TYPE_UNSPECIFIED = 0;
  RACK_LIST_DATA_TYPE_GENERAL = 1;
  RACK_LIST_DATA_TYPE_STOCK = 2;
  RACK_LIST_DATA_TYPE_WAREHOUSE = 3;
}

enum RackGeneralSort {
  RACK_GENERAL_SORT_UNSPECIFIED = 0;
  RACK_GENERAL_SORT_NAME = 1;
  RACK_GENERAL_SORT_CREATED = 2;
}

enum RackStockSort {
  RACK_STOCK_SORT_UNSPECIFIED = 0;
  RACK_STOCK_SORT_STOCK_COUNT = 1;
  RACK_STOCK_SORT_PRODUCT_COUNT = 2;
}

message RackListFilter {
  uint64 warehouse_id = 1;
  uint64 team_id = 2; // racks holding this team's stock (optional)
  string search = 3; // name ILIKE (optional)
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
  uint64 product_id = 5; // racks currently holding this product (optional)
}

message RackListSort {
  common.v1.SortType sort_type = 1;
  oneof s {
    RackGeneralSort general = 2;
    RackStockSort stock = 3;
  }
}

message RackListRequest {
  RackListFilter filter = 1 [(buf.validate.field).required = true];
  RackListSort sort = 2;
  repeated RackListDataType data_types = 3 [(buf.validate.field).repeated.min_items = 1];
}

message RackGeneralItem {
  uint64 id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
}
message RackGeneralData {
  map<uint64, RackGeneralItem> data = 1;
}

message RackStockItem {
  int64 stock_count = 1;
  int64 product_count = 2;
}
message RackStockData {
  map<uint64, RackStockItem> data = 1;
}

message RackWarehouseItem {
  uint64 warehouse_id = 1;
  string warehouse_name = 2;
}
message RackWarehouseData {
  map<uint64, RackWarehouseItem> data = 1;
}

message RackData {
  oneof data {
    RackGeneralData general = 1;
    RackStockData stock = 2;
    RackWarehouseData warehouse = 3;
  }
}

message RackListResponse {
  repeated RackData data = 1;
  repeated uint64 ids = 2;
}

// RackByIds follows the "Rule Rpc that load Data By IDs" guideline
// (docs/proto-guideline.md): filter + data_request in; a map keyed by rack id out,
// each id carrying one oneof-typed item per requested data type.
enum RackByIdsDataType {
  RACK_BY_IDS_DATA_TYPE_UNSPECIFIED = 0;
  RACK_BY_IDS_DATA_TYPE_GENERAL = 1; // name
}

message RackByIdsFilter {
  repeated uint64 ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      uint64: {gt: 0}
    }
  }];
}

message RackByIdsRequest {
  // Any authenticated caller (per inventory docs). Inert until inventory_service
  // mounts the v2 access interceptor; declared now so the gate applies when it does.
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  RackByIdsFilter filter = 1 [(buf.validate.field).required = true];
  repeated RackByIdsDataType data_request = 2 [(buf.validate.field).repeated = {
    min_items: 1
    items: {
      enum: {
        defined_only: true
        not_in: [0]
      }
    }
  }];
}

message RackByIdsGeneralItem {
  uint64 id = 1;
  string name = 2;
}

message RackByIdsItem {
  oneof d {
    RackByIdsGeneralItem general = 1;
  }
}

message RackByIdsItemList {
  repeated RackByIdsItem items = 1;
}

message RackByIdsResponse {
  map<uint64, RackByIdsItemList> items = 1; // keyed by rack id; missing/deleted ids omitted
}

// --- Product management ---

message ProductConfigRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message ProductConfigResponse {
  uint64 product_id = 1;
  uint64 warehouse_id = 2;
  QueueType queue_type = 3; // stock batch price-ordering queue
  PlacementPickingType placement_picking = 4;
  bool configured = 5; // false => defaults returned (no stored config)
}

message ProductConfigUpdateRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  QueueType queue_type = 3;
  PlacementPickingType placement_picking = 4;
}
message ProductConfigUpdateResponse {}

message ProductDetailRequest {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message ProductDetailResponse {
  uint64 product_id = 1;
  uint64 warehouse_id = 2;
  string name = 3;
  uint64 team_id = 4;
  string team_name = 5;
  int64 stock_ready = 6;
  double stock_ready_amount = 7;
  int64 batch_count = 8;
  int64 rack_count = 9;
  QueueType queue_type = 10;
  PlacementPickingType placement_picking = 11;
  bool configured = 12;
  google.protobuf.Timestamp updated_at = 13;
  // Ongoing (in-transit) inbound/outbound for this product+warehouse — pending docs only.
  int64 ongoing_restock_count = 14; // pending/problem restocks into this warehouse
  double ongoing_restock_amount = 15;
  int64 ongoing_transfer_out_count = 16; // pending transfers where this warehouse is the source
  double ongoing_transfer_out_amount = 17;
  int64 ongoing_transfer_in_count = 18; // pending transfers where this warehouse is the destination
  double ongoing_transfer_in_amount = 19;
}

// ProductList follows the flexible list convention (see docs/proto-guideline.md).
enum ProductListDataType {
  PRODUCT_LIST_DATA_TYPE_UNSPECIFIED = 0;
  PRODUCT_LIST_DATA_TYPE_GENERAL = 1;
  PRODUCT_LIST_DATA_TYPE_STOCK = 2;
  PRODUCT_LIST_DATA_TYPE_TEAM = 3;
  PRODUCT_LIST_DATA_TYPE_CONFIG = 4;
}

enum ProductGeneralSort {
  PRODUCT_GENERAL_SORT_UNSPECIFIED = 0;
  PRODUCT_GENERAL_SORT_NAME = 1;
}

enum ProductStockSort {
  PRODUCT_STOCK_SORT_UNSPECIFIED = 0;
  PRODUCT_STOCK_SORT_STOCK_READY = 1;
  PRODUCT_STOCK_SORT_STOCK_AMOUNT = 2;
}

message ProductListFilter {
  uint64 warehouse_id = 1;
  uint64 team_id = 2; // optional
  string search = 3; // name ILIKE (optional)
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
}

message ProductListSort {
  common.v1.SortType sort_type = 1;
  oneof s {
    ProductGeneralSort general = 2;
    ProductStockSort stock = 3;
  }
}

message ProductListRequest {
  ProductListFilter filter = 1 [(buf.validate.field).required = true];
  ProductListSort sort = 2;
  repeated ProductListDataType data_types = 3 [(buf.validate.field).repeated.min_items = 1];
}

message ProductGeneralItem {
  uint64 id = 1;
  string name = 2;
}
message ProductGeneralData {
  map<uint64, ProductGeneralItem> data = 1;
}

message ProductStockItem {
  int64 stock_ready = 1;
  double stock_ready_amount = 2;
  int64 batch_count = 3;
  int64 rack_count = 4;
}
message ProductStockData {
  map<uint64, ProductStockItem> data = 1;
}

message ProductTeamItem {
  uint64 team_id = 1;
  string team_name = 2;
}
message ProductTeamData {
  map<uint64, ProductTeamItem> data = 1;
}

message ProductConfigItem {
  QueueType queue_type = 1;
  PlacementPickingType placement_picking = 2;
  bool configured = 3;
}
message ProductConfigData {
  map<uint64, ProductConfigItem> data = 1;
}

message ProductData {
  oneof data {
    ProductGeneralData general = 1;
    ProductStockData stock = 2;
    ProductTeamData team = 3;
    ProductConfigData config = 4;
  }
}

message ProductListResponse {
  repeated ProductData data = 1;
  repeated uint64 ids = 2;
}

// --- Restock workflow ---

// One product line of a restock document. price is the per-unit value.
message RestockItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  int64 count = 2 [(buf.validate.field).int64.gt = 0];
  double price = 3;
}

message RestockCreateRequest {
  uint64 team_id = 1;
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  string supplier = 3;
  string receipt = 4;
  string note = 5;
  repeated RestockItem items = 6 [(buf.validate.field).repeated.min_items = 1];
  // Purchase/order info (selling-team create-restock flow).
  string extern_order_id = 7;
  uint64 shipping_id = 8; // courier (common shipment id)
  double shipping_cost = 9; // ongkir
  warehouse_iface.v1.PaymentType payment_type = 10;
}
message RestockCreateResponse {
  uint64 restock_id = 1;
}

// Status marker toggle (pre-accept only): PENDING <-> PROBLEM, optional note append.
message ChangeStatus {
  RestockStatus status = 1 [(buf.validate.field).enum = {
    defined_only: true
    in: [
      1,
      3
    ]
  }]; // PENDING | PROBLEM
  string note = 2;
}

// Replace the restock's item lines (pre-accept only).
message UpdateItems {
  repeated RestockItem items = 1 [(buf.validate.field).repeated.min_items = 1];
}

// Update the shipping fee / ongkir (pre-accept only).
message UpdateShippingFee {
  double shipping_cost = 1;
}

// Update the purchase/shipping info (pre-accept only).
message UpdateShippingInfo {
  uint64 shipping_id = 1; // courier
  string receipt = 2;
  string extern_order_id = 3;
  warehouse_iface.v1.PaymentType payment_type = 4;
}

// Cancel: PENDING/PROBLEM -> status flip. Pre-accept only — canceling an
// accepted restock is rejected.
message RestockCancel {}

// One problematic line of a restock (which product, how many, why).
message RestockProblemItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  int64 count = 2 [(buf.validate.field).int64.gt = 0];
  string note = 3;
}

// Goods placement into racks at accept time.
message RestockPlacementItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 rack_id = 2 [(buf.validate.field).uint64.gt = 0];
  int64 count = 3 [(buf.validate.field).int64.gt = 0];
}

message RestockPlacements {
  repeated RestockPlacementItem items = 1;
}

message RestockProblems {
  repeated RestockProblemItem items = 1;
}

// Accept the goods: mints the internal inventory transaction. Problem counts are
// EXCLUDED from stock (recorded on the item rows). Placements are REQUIRED and must
// fully account the accepted goods (placed + problem == ordered, per product).
message RestockAccept {
  RestockPlacements placements = 1; // required: every accepted unit placed on a rack
  RestockProblems problems = 2; // optional (goods with a problem, excluded from stock)
  double warehouse_accept_fee = 3; // > 0 → selling team payable to the accepting warehouse
}

message RestockUpdateAction {
  oneof act {
    ChangeStatus change_status = 1;
    UpdateItems update_items = 2;
    UpdateShippingFee update_shipping_fee = 3;
    UpdateShippingInfo update_shipping_info = 4;
    RestockCancel restock_cancel = 5;
    RestockAccept restock_accept = 6;
  }
}

message RestockUpdateRequest {
  uint64 restock_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2; // optional scope
  // Applied in order, all-or-nothing in one transaction. change_status /
  // update_items / update_shipping_fee / update_shipping_info are rejected once
  // the restock is accepted.
  repeated RestockUpdateAction actions = 3 [(buf.validate.field).repeated.min_items = 1];
}
message RestockUpdateResponse {}

message RestockDetailRequest {
  uint64 restock_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2;
}

message RestockDetailItem {
  uint64 product_id = 1;
  string product_name = 2;
  int64 count = 3;
  double price = 4;
  double total = 5;
  // Per-item problem detail (set via RestockUpdate{problem}.items).
  int64 problem_count = 6;
  string problem_note = 7;
}

message RestockDetailResponse {
  uint64 id = 1;
  uint64 team_id = 2;
  uint64 warehouse_id = 3;
  string supplier = 4;
  string receipt = 5;
  string note = 6;
  RestockStatus status = 7;
  uint64 inventory_transaction_id = 8; // 0 when not accepted (nullable in the model)
  uint64 created_by_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp accepted_at = 11;
  google.protobuf.Timestamp canceled_at = 12;
  int64 item_count = 13;
  double amount = 14;
  repeated RestockDetailItem items = 15;
  string extern_order_id = 16;
  uint64 shipping_id = 17;
  double shipping_cost = 18; // ongkir
  warehouse_iface.v1.PaymentType payment_type = 19;
  double warehouse_accept_fee = 20; // fee charged by the warehouse on accept (0 = none)
}

// RestockList follows the flexible list convention (see docs/proto-guideline.md).
enum RestockListDataType {
  RESTOCK_LIST_DATA_TYPE_UNSPECIFIED = 0;
  RESTOCK_LIST_DATA_TYPE_GENERAL = 1;
  RESTOCK_LIST_DATA_TYPE_TOTAL = 2;
}

enum RestockGeneralSort {
  RESTOCK_GENERAL_SORT_UNSPECIFIED = 0;
  RESTOCK_GENERAL_SORT_CREATED = 1;
  RESTOCK_GENERAL_SORT_RECEIPT = 2;
}

enum RestockTotalSort {
  RESTOCK_TOTAL_SORT_UNSPECIFIED = 0;
  RESTOCK_TOTAL_SORT_AMOUNT = 1;
  RESTOCK_TOTAL_SORT_ITEM_COUNT = 2;
}

message RestockListFilter {
  uint64 warehouse_id = 1;
  uint64 team_id = 2; // optional
  RestockStatus status = 3; // optional
  string search = 4; // receipt/supplier ILIKE (optional)
  common.v1.PageFilter page = 5 [(buf.validate.field).required = true];
}

message RestockListSort {
  common.v1.SortType sort_type = 1;
  oneof s {
    RestockGeneralSort general = 2;
    RestockTotalSort total = 3;
  }
}

message RestockListRequest {
  RestockListFilter filter = 1 [(buf.validate.field).required = true];
  RestockListSort sort = 2;
  repeated RestockListDataType data_types = 3 [(buf.validate.field).repeated.min_items = 1];
}

message RestockGeneralItem {
  uint64 id = 1;
  string receipt = 2;
  string supplier = 3;
  RestockStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp accepted_at = 6;
}
message RestockGeneralData {
  map<uint64, RestockGeneralItem> data = 1;
}

message RestockTotalItem {
  int64 item_count = 1;
  double amount = 2;
}
message RestockTotalData {
  map<uint64, RestockTotalItem> data = 1;
}

message RestockData {
  oneof data {
    RestockGeneralData general = 1;
    RestockTotalData total = 2;
  }
}

message RestockListResponse {
  repeated RestockData data = 1;
  repeated uint64 ids = 2;
}

// Flat per-document audit log (ProductPlacementLog precedent), chronological.
message RestockLogListRequest {
  uint64 restock_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2; // optional scope
  common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message RestockLogItem {
  RestockLogAction action = 1;
  string note = 2;
  uint64 created_by_id = 3;
  google.protobuf.Timestamp created_at = 4;
}

message RestockLogListResponse {
  repeated RestockLogItem logs = 1;
  common.v1.PageInfo page_info = 2;
}

// --- Transfer stock between warehouses ---

// One product line of a transfer. No price: the per-unit value is derived from the
// source warehouse's StockState average at create time (value is conserved).
message TransferItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  int64 count = 2 [(buf.validate.field).int64.gt = 0];
}

message TransferCreateRequest {
  uint64 team_id = 1;
  uint64 from_warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 to_warehouse_id = 3 [(buf.validate.field).uint64.gt = 0];
  string note = 4;
  repeated TransferItem items = 5 [(buf.validate.field).repeated.min_items = 1];
}
message TransferCreateResponse {
  uint64 transfer_id = 1;
}

message TransferPlacementItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 rack_id = 2 [(buf.validate.field).uint64.gt = 0];
  int64 count = 3 [(buf.validate.field).int64.gt = 0];
}

message TransferPlacements {
  repeated TransferPlacementItem items = 1;
}

message TransferAcceptRequest {
  uint64 transfer_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2; // optional scope: the destination warehouse
  // Required: every received unit of each product placed on a live rack of the
  // destination warehouse (placed == received count per product).
  TransferPlacements placements = 3;
}
message TransferAcceptResponse {}

message TransferCancelRequest {
  uint64 transfer_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2; // optional scope: the source warehouse
}
message TransferCancelResponse {}

message TransferDetailRequest {
  uint64 transfer_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 warehouse_id = 2; // optional scope: matches either side
}

message TransferDetailItem {
  uint64 product_id = 1;
  string product_name = 2;
  int64 count = 3;
  double price = 4;
  double total = 5;
}

message TransferDetailResponse {
  uint64 id = 1;
  uint64 team_id = 2;
  uint64 from_warehouse_id = 3;
  string from_warehouse_name = 4;
  uint64 to_warehouse_id = 5;
  string to_warehouse_name = 6;
  string note = 7;
  TransferStatus status = 8;
  uint64 out_transaction_id = 9;
  uint64 in_transaction_id = 10;
  uint64 created_by_id = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp accepted_at = 13;
  google.protobuf.Timestamp canceled_at = 14;
  int64 item_count = 15;
  double amount = 16;
  repeated TransferDetailItem items = 17;
}

// TransferList follows the flexible list convention (see docs/proto-guideline.md).
enum TransferListDataType {
  TRANSFER_LIST_DATA_TYPE_UNSPECIFIED = 0;
  TRANSFER_LIST_DATA_TYPE_GENERAL = 1;
  TRANSFER_LIST_DATA_TYPE_TOTAL = 2;
}

enum TransferGeneralSort {
  TRANSFER_GENERAL_SORT_UNSPECIFIED = 0;
  TRANSFER_GENERAL_SORT_CREATED = 1;
}

enum TransferTotalSort {
  TRANSFER_TOTAL_SORT_UNSPECIFIED = 0;
  TRANSFER_TOTAL_SORT_AMOUNT = 1;
  TRANSFER_TOTAL_SORT_ITEM_COUNT = 2;
}

message TransferListFilter {
  uint64 warehouse_id = 1; // matches EITHER side (from or to)
  uint64 from_warehouse_id = 2; // optional
  uint64 to_warehouse_id = 3; // optional
  uint64 team_id = 4; // optional
  TransferStatus status = 5; // optional
  common.v1.PageFilter page = 6 [(buf.validate.field).required = true];
}

message TransferListSort {
  common.v1.SortType sort_type = 1;
  oneof s {
    TransferGeneralSort general = 2;
    TransferTotalSort total = 3;
  }
}

message TransferListRequest {
  TransferListFilter filter = 1 [(buf.validate.field).required = true];
  TransferListSort sort = 2;
  repeated TransferListDataType data_types = 3 [(buf.validate.field).repeated.min_items = 1];
}

message TransferGeneralItem {
  uint64 id = 1;
  uint64 from_warehouse_id = 2;
  string from_warehouse_name = 3;
  uint64 to_warehouse_id = 4;
  string to_warehouse_name = 5;
  TransferStatus status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp accepted_at = 8;
}
message TransferGeneralData {
  map<uint64, TransferGeneralItem> data = 1;
}

message TransferTotalItem {
  int64 item_count = 1;
  double amount = 2;
}
message TransferTotalData {
  map<uint64, TransferTotalItem> data = 1;
}

message TransferData {
