syntax = "proto3";
package inventory_iface.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/inventory_iface/v1;inventory_iface";

enum StockChangeType {
  STOCK_CHANGE_TYPE_UNSPECIFIED = 0;
  STOCK_CHANGE_TYPE_ORDER_CREATED = 1;
  STOCK_CHANGE_TYPE_ORDER_CANCELED = 2;
  STOCK_CHANGE_TYPE_RESTOCK = 3;
  STOCK_CHANGE_TYPE_RETURN = 4;
  STOCK_CHANGE_TYPE_PROBLEM = 5;
  STOCK_CHANGE_TYPE_FOUND_BACK = 6;
  STOCK_CHANGE_TYPE_ADJUSTMENT = 7;
  STOCK_CHANGE_TYPE_TRANSFER = 8;
}

message OrderCreated {
  uint64 order_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message OrderCanceled {
  uint64 order_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message Restock {}

message Return {}

message Problem {}

message FoundBack {}

message Adjustment {}

message Transfer {
  uint64 transfer_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message ChangeItem {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
  int64 change_count = 2;
  double change_amount = 3;
}

message StockChange {
  google.protobuf.Timestamp at = 1;
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 user_id = 3;
  uint64 transaction_id = 13;

  repeated ChangeItem changes = 4 [(buf.validate.field).repeated.min_items = 1];
  oneof change {
    OrderCreated order_created = 5;
    OrderCanceled order_canceled = 6;
    Restock restock = 7;
    Return return = 8;
    Problem problem = 9;
    FoundBack found_back = 10;
    Adjustment adjustment = 11;
    Transfer transfer = 12;
  }
}
