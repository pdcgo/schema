syntax = "proto3";
package invoice_iface.v2;

import "event_base/v1/event.proto";

option go_package = "github.com/pdcgo/schema/services/invoice_iface/v2;invoice_iface";

message CrossItem {
  uint64 product_id = 1;
  uint64 team_id = 2;
  double amount = 3;
}

message WarehouseFee {
  uint64 warehouse_id = 1;
  double amount = 2;
}

message OrderCreated {
  uint64 order_id = 1;
  uint64 team_id = 2;
  WarehouseFee warehouse_fee = 3;
  repeated CrossItem cross_items = 4;
}

message OrderCanceled {
  uint64 order_id = 1;
}

message WarehouseCodFee {
  uint64 warehouse_id = 1;
  uint64 team_id = 2;
  double amount = 3;
}

message ProductProblem {}
message Adjustment {}

message InvoiceEvent {
  option (event_base.v1.event_config).event_topic = "invoice-topic";
  oneof data {
    OrderCreated order_created = 1;
    OrderCanceled order_canceled = 2;
    ProductProblem product_problem = 4;
    Adjustment adjustment = 5;
  }
}
