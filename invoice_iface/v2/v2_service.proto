syntax = "proto3";
package invoice_iface.v2;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "invoice_iface/v2/v2_balance.proto";
import "invoice_iface/v2/v2_overview.proto";
import "invoice_iface/v2/v2_team_balance_list.proto";
import "invoice_iface/v2/v2_team_balance_timeline.proto";
import "invoice_iface/v2/v2_types.proto";
import "role_base/v1/role.proto";

option go_package = "github.com/pdcgo/schema/services/invoice_iface/v2;invoice_iface";

service InvoiceService {
  rpc Overview(OverviewRequest) returns (OverviewResponse);
  rpc TeamBalanceList(TeamBalanceListRequest) returns (TeamBalanceListResponse);
  rpc TeamBalanceTimeline(TeamBalanceTimelineRequest) returns (TeamBalanceTimelineResponse);

  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc AcceptPayment(AcceptPaymentRequest) returns (AcceptPaymentResponse);
  rpc RejectPayment(RejectPaymentRequest) returns (RejectPaymentResponse);
  rpc ListPayment(ListPaymentRequest) returns (ListPaymentResponse);
  rpc ListIncomingPayment(ListIncomingPaymentRequest) returns (ListIncomingPaymentResponse);

  rpc ListTeamBalanceLog(ListTeamBalanceLogRequest) returns (ListTeamBalanceLogResponse);

  rpc CreateBalanceLog(CreateBalanceLogRequest) returns (CreateBalanceLogResponse);
  
  rpc TeamReconcile(TeamReconcileRequest) returns (TeamReconcileResponse);
  
  rpc CheckOweLimit(CheckOweLimitRequest) returns (CheckOweLimitResponse);
  
  rpc GetBalanceChangeSource(GetBalanceChangeSourceRequest) returns (GetBalanceChangeSourceResponse);
  rpc GetBalanceChangeSourceByChangeIds(GetBalanceChangeSourceByChangeIdsRequest) returns (GetBalanceChangeSourceByChangeIdsResponse);

  // Owe-limit config CRUD. team_id is always the CREDITOR (the limit owner): it
  // declares how much a debtor may owe it. A custom row for a specific debtor
  // beats the creditor's default row; threshold 0 = unlimited; no row = allow.
  rpc OweLimitDefaultGet(OweLimitDefaultGetRequest) returns (OweLimitDefaultGetResponse);
  rpc OweLimitDefaultSet(OweLimitDefaultSetRequest) returns (OweLimitDefaultSetResponse);
  rpc OweLimitCustomList(OweLimitCustomListRequest) returns (OweLimitCustomListResponse);
  rpc OweLimitCustomSet(OweLimitCustomSetRequest) returns (OweLimitCustomSetResponse);
  rpc OweLimitCustomDelete(OweLimitCustomDeleteRequest) returns (OweLimitCustomDeleteResponse);
}

message TeamReconcileRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1;
}
message TeamReconcileResponse {}

// CheckOweLimit reports, for a debtor team (team_id, the caller), whether it may
// still owe each listed creditor (cfg_team_ids) — i.e. its current PAYABLE to that
// creditor is below the creditor's configured owe threshold. Debt is read from the
// invoice v2 ledger (team_balances); config from owe_limit_configurations.
message CheckOweLimitRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  repeated uint64 cfg_team_ids = 2 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.max_items = 100,
    (buf.validate.field).repeated.unique = true,
    (buf.validate.field).repeated.items.uint64.gt = 0
  ];
}

message OweLimitAllow {
  bool allow = 1;
  double active_amount = 2;
  double threshold = 3;
}

message CheckOweLimitResponse {
  map<uint64, OweLimitAllow> can_owe = 1;
}

// ---- Owe-limit config CRUD (team_id = the CREDITOR / limit owner) ----

message OweLimitDefaultGetRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
}

message OweLimitDefaultGetResponse {
  bool configured = 1; // false = no default rule (any debtor allowed)
  double threshold = 2; // 0 = unlimited
}

message OweLimitDefaultSetRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  double threshold = 2 [(buf.validate.field).double.gte = 0];
}

message OweLimitDefaultSetResponse {}

message OweLimitCustomItem {
  uint64 id = 1;
  uint64 for_team_id = 2; // the DEBTOR this threshold applies to
  double threshold = 3;
}

message OweLimitCustomListFilter {
  string q = 1;
}

enum OweLimitCustomSortType {
  OWE_LIMIT_CUSTOM_SORT_TYPE_UNSPECIFIED = 0;
  OWE_LIMIT_CUSTOM_SORT_TYPE_THRESHOLD = 1;
}

message OweLimitCustomSort {
  OweLimitCustomSortType type = 1;
  SortType sort_type = 2;
}

message OweLimitCustomListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  common.v1.PageFilter page = 2 [(buf.validate.field).required = true];
  OweLimitCustomListFilter filter = 3;
  OweLimitCustomSort sort = 4;
}

message OweLimitCustomListResponse {
  repeated OweLimitCustomItem items = 1;
  common.v1.PageInfo page_info = 2;
}

message OweLimitCustomSetRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2 [(buf.validate.field).uint64.gt = 0];
  double threshold = 3 [(buf.validate.field).double.gte = 0];
}

message OweLimitCustomSetResponse {}

message OweLimitCustomDeleteRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message OweLimitCustomDeleteResponse {}

message CreateBalanceLogRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2 [(buf.validate.field).uint64.gt = 0];
  BalanceChangeType change_type = 3 [(buf.validate.field).enum.defined_only = true];
  double change_amount = 4 [(buf.validate.field).double.gt = 0];
  BalanceType balance_type = 5 [(buf.validate.field).enum.defined_only = true];
  string note = 6;
}

message CreateBalanceLogResponse {}

message ListPaymentRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2;
  PaymentStatus status = 3;
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
  google.protobuf.Timestamp from_time = 5;
  google.protobuf.Timestamp to_time = 6;
}

message ListPaymentResponse {
  repeated Payment payments = 1;
  common.v1.PageInfo page_info = 2;
}

message ListIncomingPaymentRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 for_team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 team_id = 2;
  PaymentStatus status = 3;
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
  google.protobuf.Timestamp from_time = 5;
  google.protobuf.Timestamp to_time = 6;
}

message ListIncomingPaymentResponse {
  repeated Payment payments = 1;
  common.v1.PageInfo page_info = 2;
}

message ListTeamBalanceLogRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2;
  google.protobuf.Timestamp from_time = 3;
  google.protobuf.Timestamp to_time = 4;
  BalanceType balance_type = 5 [(buf.validate.field).enum.defined_only = true];
  common.v1.PageFilter page = 6 [(buf.validate.field).required = true];
  // Optional order-source filters (0 / UNSPECIFIED = no filter).
  uint64 order_id = 7;
  uint64 warehouse_id = 8;
  OrderSystem order_system = 9;
}

message ListTeamBalanceLogResponse {
  repeated BalanceChangeLog logs = 1;
  common.v1.PageInfo page_info = 2;
}

message BalanceChangeOrderSourceType {
  uint64 order_id = 1 [(buf.validate.field).uint64.gt = 0];
  OrderSystem order_system = 2;
}

message BalanceChangeRestockSourceType {
  uint64 tx_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message BalanceChangeBrokenSourceType {
  uint64 tx_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message GetBalanceChangeSourceRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 4 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  oneof source_type {
    option (buf.validate.oneof).required = true;

    BalanceChangeOrderSourceType order = 1;
    BalanceChangeRestockSourceType restock = 2;
    BalanceChangeBrokenSourceType broken = 3;
  }
}

message BalanceChangeOrderSourceItem {
  uint64 balance_change_log_id = 1;
  OrderSystem order_system = 2;
  uint64 order_id = 3;
  uint64 order_item_id = 4;
  uint64 team_id = 5;
  uint64 warehouse_id = 6;
  google.protobuf.Timestamp created_at = 7;
}

message BalanceChangeRestockSourceItem {
  uint64 balance_change_log_id = 1;
  uint64 tx_id = 2;
  uint64 tx_item_id = 3;
  uint64 team_id = 4;
  uint64 warehouse_id = 5;
  google.protobuf.Timestamp created_at = 6;
}

message BalanceChangeBrokenSourceItem {
  uint64 balance_change_log_id = 1;
  uint64 tx_id = 2;
  uint64 tx_item_id = 3;
  uint64 team_id = 4;
  uint64 warehouse_id = 5;
  google.protobuf.Timestamp created_at = 6;
}

message BalanceChangeOrderSourceData {
  repeated BalanceChangeOrderSourceItem items = 1;
}

message BalanceChangeRestockSourceData {
  repeated BalanceChangeRestockSourceItem items = 1;
}

message BalanceChangeBrokenSourceData {
  repeated BalanceChangeBrokenSourceItem items = 1;
}

message GetBalanceChangeSourceResponse {
  oneof data {
    BalanceChangeOrderSourceData order = 1;
    BalanceChangeRestockSourceData restock = 2;
    BalanceChangeBrokenSourceData broken = 3;
  }
}

message GetBalanceChangeSourceByChangeIdsRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  repeated uint64 balance_change_log_ids = 2 [
    (buf.validate.field).repeated.min_items = 1,
    (buf.validate.field).repeated.max_items = 100,
    (buf.validate.field).repeated.unique = true,
    (buf.validate.field).repeated.items.uint64.gt = 0
  ];
}

message BalanceChangeSourceEntry {
  oneof source {
    BalanceChangeOrderSourceItem order = 1;
    BalanceChangeRestockSourceItem restock = 2;
    BalanceChangeBrokenSourceItem broken = 3;
  }
}

message GetBalanceChangeSourceByChangeIdsResponse {
  map<uint64, BalanceChangeSourceEntry> entries = 1;
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_PENDING = 1;
  PAYMENT_STATUS_ACCEPTED = 2;
  PAYMENT_STATUS_REJECTED = 3;
}

message Payment {
  uint64 id = 1;
  uint64 team_id = 2;
  uint64 for_team_id = 3;
  double amount = 4;
  string note = 5;
  string document_id = 6;
  PaymentStatus status = 7;
  uint64 created_by_id = 8;
  uint64 completed_by_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp accepted_at = 11;
  google.protobuf.Timestamp rejected_at = 12;
}

message CreatePaymentRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2 [(buf.validate.field).uint64.gt = 0];
  double amount = 3 [(buf.validate.field).double.gt = 0];
  string note = 4;
  string document_id = 5 [(buf.validate.field).string = {
    min_len: 0
    max_len: 100
  }];
}

message CreatePaymentResponse {
  uint64 id = 1;
}

message AcceptPaymentRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 for_team_id = 2 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 payment_id = 3 [(buf.validate.field).uint64.gt = 0];
}

message AcceptPaymentResponse {}

message RejectPaymentRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 for_team_id = 2 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 payment_id = 3 [(buf.validate.field).uint64.gt = 0];
}

message RejectPaymentResponse {}
