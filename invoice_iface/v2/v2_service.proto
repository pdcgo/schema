syntax = "proto3";
package invoice_iface.v2;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "invoice_iface/v2/v2_balance.proto";
import "invoice_iface/v2/v2_overview.proto";
import "invoice_iface/v2/v2_team_balance_list.proto";
import "invoice_iface/v2/v2_types.proto";
import "role_base/v1/role.proto";

option go_package = "github.com/pdcgo/schema/services/invoice_iface/v2;invoice_iface";

service InvoiceService {
  rpc Overview(OverviewRequest) returns (OverviewResponse);
  rpc TeamBalanceList(TeamBalanceListRequest) returns (TeamBalanceListResponse);

  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc AcceptPayment(AcceptPaymentRequest) returns (AcceptPaymentResponse);
  rpc RejectPayment(RejectPaymentRequest) returns (RejectPaymentResponse);
  rpc ListPayment(ListPaymentRequest) returns (ListPaymentResponse);
  rpc ListIncomingPayment(ListIncomingPaymentRequest) returns (ListIncomingPaymentResponse);

  rpc ListTeamBalanceLog(ListTeamBalanceLogRequest) returns (ListTeamBalanceLogResponse);

  rpc CreateBalanceLog(CreateBalanceLogRequest) returns (CreateBalanceLogResponse);

  rpc TeamReconcile(TeamReconcileRequest) returns (TeamReconcileResponse);
}

message TeamReconcileRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1;
}
message TeamReconcileResponse {}

message CreateBalanceLogRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2 [(buf.validate.field).uint64.gt = 0];
  BalanceChangeType change_type = 3 [(buf.validate.field).enum.defined_only = true];
  double change_amount = 4 [(buf.validate.field).double.gt = 0];
  BalanceType balance_type = 5 [(buf.validate.field).enum.defined_only = true];
  string note = 6;
}

message CreateBalanceLogResponse {}

message ListPaymentRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2;
  PaymentStatus status = 3;
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
}

message ListPaymentResponse {
  repeated Payment payments = 1;
  common.v1.PageInfo page_info = 2;
}

message ListIncomingPaymentRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 for_team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 team_id = 2;
  PaymentStatus status = 3;
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
}

message ListIncomingPaymentResponse {
  repeated Payment payments = 1;
  common.v1.PageInfo page_info = 2;
}

message ListTeamBalanceLogRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2;
  google.protobuf.Timestamp from_time = 3;
  google.protobuf.Timestamp to_time = 4;
  BalanceType balance_type = 5 [(buf.validate.field).enum.defined_only = true];
  common.v1.PageFilter page = 6 [(buf.validate.field).required = true];
}

message ListTeamBalanceLogResponse {
  repeated BalanceChangeLog logs = 1;
  common.v1.PageInfo page_info = 2;
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_PENDING = 1;
  PAYMENT_STATUS_ACCEPTED = 2;
  PAYMENT_STATUS_REJECTED = 3;
}

message Payment {
  uint64 id = 1;
  uint64 team_id = 2;
  uint64 for_team_id = 3;
  double amount = 4;
  string note = 5;
  string document_id = 6;
  PaymentStatus status = 7;
  uint64 created_by_id = 8;
  uint64 completed_by_id = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp accepted_at = 11;
  google.protobuf.Timestamp rejected_at = 12;
}

message CreatePaymentRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 for_team_id = 2 [(buf.validate.field).uint64.gt = 0];
  double amount = 3 [(buf.validate.field).double.gt = 0];
  string note = 4;
  string document_id = 5 [(buf.validate.field).string = {
    min_len: 0
    max_len: 100
  }];
}

message CreatePaymentResponse {
  uint64 id = 1;
}

message AcceptPaymentRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 for_team_id = 2 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 payment_id = 3 [(buf.validate.field).uint64.gt = 0];
}

message AcceptPaymentResponse {}

message RejectPaymentRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 for_team_id = 2 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  uint64 payment_id = 3 [(buf.validate.field).uint64.gt = 0];
}

message RejectPaymentResponse {}
