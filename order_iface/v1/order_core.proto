option go_package = "github.com/pdcgo/schema/services/order_iface/v1;order_iface";

message ShippedStatus {
  uint64 team_id = 1;
  oneof by {
    uint64 order_id = 2;
    string ref_id = 3;
  }
}

message OrderChangeStatusRequest {
  oneof status {
    ShippedStatus shipped = 1;
  }
}
message OrderChangeStatusResponse {}
