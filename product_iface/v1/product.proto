syntax = "proto3";
package product_iface.v1;

// import "accounting_iface/v1/core.proto";
import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "role_base/v1/role.proto";
// import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/product_iface/v1;product_iface";

service ProductService {
  rpc ProductDuplicate(ProductDuplicateRequest) returns (ProductDuplicateResponse);
  rpc ProductMapGet(ProductMapGetRequest) returns (ProductMapGetResponse);
  rpc ProductMapConnect(ProductMapConnectRequest) returns (ProductMapConnectResponse);

  // info Product
  rpc ProductByIDs(ProductByIDsRequest) returns (ProductByIDsResponse);

  rpc ProductListExport(ProductListExportRequest) returns (stream ProductListExportResponse);
  rpc ProductSearch(ProductSearchRequest) returns (ProductSearchResponse);

  // Fastest-ops product list for picker components: one q matches name OR code.
  rpc ProductListSearch(ProductListSearchRequest) returns (ProductListSearchResponse);

  // Product Management (CRUD) — operates on the legacy `products` table.
  rpc ProductCreate(ProductCreateRequest) returns (ProductCreateResponse);
  rpc ProductUpdate(ProductUpdateRequest) returns (ProductUpdateResponse);
  rpc ProductDelete(ProductDeleteRequest) returns (ProductDeleteResponse);
  rpc ProductList(ProductListRequest) returns (ProductListResponse);
  rpc ProductDetail(ProductDetailRequest) returns (ProductDetailResponse);

  // Previews the product code (legacy RefID) the next created product would get.
  rpc ProductCodeGenerate(ProductCodeGenerateRequest) returns (ProductCodeGenerateResponse);
}

message ProductSearchRequest {
  option (role_base.v1.request_policy) = {allow_all: true};
  uint64 team_id = 1;
  oneof search {
    string name = 2;
    string ref_id = 3;
  }

  int32 limit = 4 [(buf.validate.field).int32.gt = 0];
}

message ProductSearchItem {
  uint64 id = 1;
  string name = 2;
  string ref_id = 3;
  string image = 4;
}

message ProductSearchResponse {
  repeated ProductSearchItem products = 1;
}

enum ProductListFieldSort {
  PRODUCT_LIST_FIELD_SORT_UNSPECIFIED = 0;
  PRODUCT_LIST_FIELD_SORT_PIECE_COUNT = 1;
  PRODUCT_LIST_FIELD_SORT_REVENUE_AMOUNT = 2;
  PRODUCT_LIST_FIELD_SORT_ORDER_COUNT = 3;
  PRODUCT_LIST_FIELD_SORT_SHOP_COUNT = 4;
  PRODUCT_LIST_FIELD_SORT_TEAM_COUNT = 5;
  PRODUCT_LIST_FIELD_SORT_ONGOING_STOCK = 6;
  PRODUCT_LIST_FIELD_SORT_READY_STOCK = 7;
  PRODUCT_LIST_FIELD_SORT_TOTAL_STOCK = 8;
  PRODUCT_LIST_FIELD_SORT_RESERVED_STOCK = 9;
}

message ProductListSort {
  ProductListFieldSort field = 1;
  common.v1.SortType type = 2;
}

message ProductListExportRequest {
  option (role_base.v1.request_policy) = {allow_all: true};
  uint64 team_id = 1;
  bool exclude_selected_team_id = 9;
  bool is_locked = 2;
  ProductListSort sort = 3 [(buf.validate.field).required = true];

  oneof sold_by {
    uint64 sold_by_team_id = 4;
    uint64 sold_by_shop_id = 5;
  }

  oneof search {
    string product_name = 6;
    string sku_id = 7;
  }
  common.v1.TimeFilterRange time_range = 8 [(buf.validate.field).required = true];
}

message ProductItem {
  uint64 id = 1;
  string name = 2;
  string ref_id = 3;
  string owner_team_name = 4;

  int64 shop_count = 5;
  int64 team_count = 6;
  int64 order_count = 7;
  int64 piece_count = 8;
  double revenue_amount = 9;

  int64 ongoing_stock = 10;
  int64 ready_stock = 11;
  int64 total_stock = 12;
  int64 reserved_stock = 13;
}

message ProductListExportResponse {
  string message = 1;
  int64 offset = 2;
  int64 total = 3;
  bytes data = 4;
}

// ProductListSearch is the "Product List for Fastest Ops" RPC (see
// product_service/docs/readme.md): a lean, team-scoped search backing picker
// components — a single q matches product name OR product code (ref_id).
message ProductListSearchRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  string q = 2; // matches name OR ref_id (code), ILIKE; empty = newest products
  int64 limit = 3; // default 25, cap 100
}

message ProductListSearchItem {
  uint64 id = 1;
  string name = 2;
  string ref_id = 3;
  string image = 4;
}

message ProductListSearchResponse {
  repeated ProductListSearchItem products = 1;
}

// ProductByIDs follows the "Rule Rpc that load Data By IDs" guideline
// (docs/proto-guideline.md): filter + data_request in; a map keyed by product id out,
// each id carrying one oneof-typed item per requested data type.
enum ProductByIdsDataType {
  PRODUCT_BY_IDS_DATA_TYPE_UNSPECIFIED = 0;
  PRODUCT_BY_IDS_DATA_TYPE_GENERAL = 1; // name, ref_id, image
  PRODUCT_BY_IDS_DATA_TYPE_TEAM = 2; // team_id, team_name
}

message ProductByIdsFilter {
  repeated uint64 ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      uint64: {gt: 0}
    }
  }];
  uint64 team_id = 2; // optional scope
}

message ProductByIDsRequest {
  option (role_base.v1.request_policy) = {allow_all: true};
  ProductByIdsFilter filter = 1 [(buf.validate.field).required = true];
  repeated ProductByIdsDataType data_request = 2 [(buf.validate.field).repeated = {
    min_items: 1
    items: {
      enum: {
        defined_only: true
        not_in: [0]
      }
    }
  }];
}

message ProductByIdsGeneralItem {
  uint64 id = 1;
  string name = 2;
  string ref_id = 3;
  string image = 4;
}

message ProductByIdsTeamItem {
  uint64 team_id = 1;
  string team_name = 2;
}

message ProductByIdsItem {
  oneof d {
    ProductByIdsGeneralItem general = 1;
    ProductByIdsTeamItem team = 2;
  }
}

message ProductByIdsItemList {
  repeated ProductByIdsItem items = 1;
}

message ProductByIDsResponse {
  map<uint64, ProductByIdsItemList> items = 1; // keyed by product id
}

message ProductDuplicateRequest {
  option (role_base.v1.request_policy) = {allow_all: true};
  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 variation_id = 2 [(buf.validate.field).uint64.gt = 0];
}
message ProductDuplicateResponse {
  uint64 new_product_id = 1;
  uint64 new_variation_id = 2;
}

message ProductMapGetRequest {
  option (role_base.v1.request_policy) = {allow_all: true};
  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 variation_id = 2 [(buf.validate.field).uint64.gt = 0];
}

message ProductMapGetResponse {
  uint64 product_id = 1;
  uint64 variation_id = 2;
  uint64 team_id = 3;
}

message ProductMapConnectRequest {
  option (role_base.v1.request_policy) = {allow_all: true};
  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 variation_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 to_variation_id = 3 [(buf.validate.field).uint64.gt = 0];
}

message ProductMapConnectResponse {}

// ---------------------------------------------------------------------------
// Product Management (CRUD). Backed by the legacy `products` table; a product
// is owned by a team (team_id) and soft-deleted via the `deleted` column.
// ---------------------------------------------------------------------------

message ProductCreateRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  string name = 2 [(buf.validate.field).string = {min_len: 1}];
  string ref_id = 3; // ignored when the server can auto-generate the product code
  repeated string images = 4;
  string description = 5;
  double markup_percent = 6;
  bool cross_locked = 7;
  uint64 category_id = 8; // optional (UI requires it); attaches a product_category row
}

message ProductCreateResponse {
  uint64 id = 1;
  string product_code = 2; // the ref_id assigned to the new product
}

message ProductUpdateRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 team_id = 2 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  string name = 3 [(buf.validate.field).string = {min_len: 1}];
  string ref_id = 4;
  repeated string images = 5;
  string description = 6;
  double markup_percent = 7;
  bool cross_locked = 8;
  uint64 category_id = 9; // when > 0, replaces the product's category association
}

message ProductUpdateResponse {}

message ProductDeleteRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 team_id = 2 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
}

message ProductDeleteResponse {}

message ProductListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
  string search = 2; // name ILIKE (optional)
  common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message ProductListItem {
  uint64 id = 1;
  string name = 2;
  string ref_id = 3;
  string image = 4; // first image (image ->> 0)
  double markup_percent = 5;
  bool cross_locked = 6;
  uint64 team_id = 7;
  string team_name = 8;
}

message ProductListResponse {
  repeated ProductListItem products = 1;
  common.v1.PageInfo page_info = 2;
}

message ProductDetailRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 team_id = 2 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
}

message ProductDetailResponse {
  uint64 id = 1;
  uint64 team_id = 2;
  string team_name = 3;
  string name = 4;
  string ref_id = 5;
  repeated string images = 6;
  string description = 7;
  double markup_percent = 8;
  bool cross_locked = 9;
  uint64 category_id = 10; // 0 = none
  string category_name = 11;
}

message ProductCodeGenerateRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 team_id = 1 [
    (buf.validate.field).uint64.gt = 0,
    (role_base.v1.use_scope) = true
  ];
}

message ProductCodeGenerateResponse {
  string product_code = 1;
}

// ---------------------------------------------------------------------------
// Category Management. Categories are GLOBAL (no team ownership) hierarchical
// master data on the legacy `categories` table. CategoryList is cross-team and
// requires only a valid authenticated identity (see docs/readme.md).
// ---------------------------------------------------------------------------

service CategoryService {
  rpc CategoryCreate(CategoryCreateRequest) returns (CategoryCreateResponse);
  rpc CategoryUpdate(CategoryUpdateRequest) returns (CategoryUpdateResponse);
  rpc CategoryDelete(CategoryDeleteRequest) returns (CategoryDeleteResponse);
  rpc CategoryList(CategoryListRequest) returns (CategoryListResponse);
}

// Category — one node of the category tree. `children` is populated by
// CategoryList (nested); it is empty on the write responses.
message Category {
  uint64 id = 1;
  string name = 2;
  uint64 parent_id = 3; // 0 = root
  int32 level = 4;
  bool is_last = 5; // leaf (no children)
  repeated Category children = 6;
}

message CategoryCreateRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  string name = 1 [(buf.validate.field).string = {min_len: 1}];
  uint64 parent_id = 2; // 0 = root
}

message CategoryCreateResponse {
  uint64 id = 1;
}

message CategoryUpdateRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  string name = 2 [(buf.validate.field).string = {min_len: 1}];
  uint64 parent_id = 3; // reparent target (0 = root)
}

message CategoryUpdateResponse {}

message CategoryDeleteRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}

message CategoryDeleteResponse {}

message CategoryListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};
  string search = 1; // optional name ILIKE
  uint64 parent_id = 2; // optional subtree root (0 = whole tree)
}

message CategoryListResponse {
  repeated Category data = 1; // roots (or the parent_id node's children), nested
}
