syntax = "proto3";
package selling_iface.v1;

// import "buf/validate/validate.proto";
import "common/v1/stat.proto";
import "google/protobuf/timestamp.proto";
import "selling_iface/v1/metric.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1;selling_iface";

message ProductSoldMetric {
  int64 piece_count = 2;
  int64 order_count = 3;
  double total_amount = 4;

  int64 own_piece_count = 5;
  int64 own_order_count = 6;
  double own_total_amount = 7;

  int64 cross_piece_count = 8;
  int64 cross_order_count = 9;
  double cross_total_amount = 10;
}

message HistoryProductSoldItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int64 piece_count = 2;
  int64 order_count = 3;
  double total_amount = 4;

  int64 own_piece_count = 5;
  int64 own_order_count = 6;
  double own_total_amount = 7;

  int64 cross_piece_count = 8;
  int64 cross_order_count = 9;
  double cross_total_amount = 10;
}

message HistoryProductSoldMetric {
  common.v1.StatTimeType time_type = 1;
  MetricType type = 2;
  repeated HistoryProductSoldItem datas = 3;
}

message SoldProductItem {
  uint64 product_id = 1;
  string name = 2;
  string image = 3;
  string ref_id = 4;
  int64 order_count = 5;
  int64 piece_count = 6;
}

message TopProductSoldMetric {
  MetricType type = 1;
  repeated SoldProductItem items = 2;
}

message UnsoldProductItem {
  int64 id = 1;
  int64 warehouse_id = 2;
  string ref_id = 3;
  string name = 4;
  string image = 5;
  int64 piece_count = 6;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp last_order_time = 7;
  string warehouse_name = 8; 
}

message TopProductUnsoldMetric {
  MetricType type = 1;
  repeated UnsoldProductItem items = 2;
}

enum ProductOrderMetricSort {
  PRODUCT_ORDER_METRIC_SORT_UNSPECIFIED = 0;
  PRODUCT_ORDER_METRIC_SORT_PIECE_COUNT = 1;
  PRODUCT_ORDER_METRIC_SORT_ORDER_COUNT = 2;
  PRODUCT_ORDER_METRIC_SORT_PIECE_AMOUNT = 3;
  PRODUCT_ORDER_METRIC_SORT_OWN_PIECE_COUNT = 4;
  PRODUCT_ORDER_METRIC_SORT_OWN_ORDER_COUNT = 5;
  PRODUCT_ORDER_METRIC_SORT_OWN_PIECE_AMOUNT = 6;
  PRODUCT_ORDER_METRIC_SORT_OWN_LAST_ORDER = 10;
  PRODUCT_ORDER_METRIC_SORT_CROSS_PIECE_COUNT = 7;
  PRODUCT_ORDER_METRIC_SORT_CROSS_ORDER_COUNT = 8;
  PRODUCT_ORDER_METRIC_SORT_CROSS_PIECE_AMOUNT = 9;
  PRODUCT_ORDER_METRIC_SORT_CROSS_LAST_ORDER = 11;
}

message ProductOrderMetricItem {
  uint64 product_id = 1;

  int64 piece_count = 2;
  int64 order_count = 3;
  double piece_amount = 4;

  int64 own_piece_count = 5;
  int64 own_order_count = 6;
  double own_piece_amount = 7;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp own_last_order = 11;

  int64 cross_piece_count = 8;
  int64 cross_order_count = 9;
  double cross_piece_amount = 10;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp cross_last_order = 12;
}

message ProductOrderMetric {
  map<uint64, ProductOrderMetricItem> data = 1;
}
