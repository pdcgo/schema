syntax = "proto3";
package selling_iface.v1;

import "common/v1/stat.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1;selling_iface";

message HistoryRestockItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 created_transaction_count = 2;
  int32 created_piece_count = 3;
  double created_piece_amount = 4;

  int32 arrived_transaction_count = 5;
  int32 arrived_piece_count = 6;
  double arrived_piece_amount = 7;
}

message HistoryRestockMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryRestockItem items = 2;
}

message HistoryTransferItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 created_transaction_count = 2;
  int32 created_piece_count = 3;
  double created_piece_amount = 4;

  int32 arrived_transaction_count = 5;
  int32 arrived_piece_count = 6;
  double arrived_piece_amount = 7;
}

message HistoryTransferMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryTransferItem items = 2;
}

message HistoryTransferCancelItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 cancel_transaction_count = 2;
  int32 cancel_piece_count = 3;
  double cancel_piece_amount = 4;
}

message HistoryTransferCancelMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryTransferCancelItem items = 2;
}

message HistoryRestockCancelItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 cancel_transaction_count = 2;
  int32 cancel_piece_count = 3;
  double cancel_piece_amount = 4;
}

message HistoryRestockCancelMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryRestockCancelItem items = 2;
}

message HistoryReturnItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 created_transaction_count = 2;
  int32 created_piece_count = 3;
  double created_piece_amount = 4;

  int32 arrived_transaction_count = 5;
  int32 arrived_piece_count = 6;
  double arrived_piece_amount = 7;
}

message HistoryReturnMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryReturnItem items = 2;
}

message HistoryStockResolutionItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 found_transaction_count = 2;
  int32 found_piece_count = 3;
  double found_piece_amount = 4;
}

message HistoryStockResolutionMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryStockResolutionItem items = 2;
}

message HistoryStockOrderItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 transaction_count = 2;
  int32 piece_count = 3;
  double piece_amount = 4;

  int32 own_transaction_count = 5;
  int32 own_piece_count = 6;
  double own_piece_amount = 7;

  int32 cross_transaction_count = 8;
  int32 cross_piece_count = 9;
  double cross_piece_amount = 10;
}

message HistoryStockOrderMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryStockOrderItem items = 2;
}

message HistoryStockOrderCancelItem {
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp t = 1;
  int32 transaction_count = 2;
  int32 piece_count = 3;
  double piece_amount = 4;

  int32 own_transaction_count = 5;
  int32 own_piece_count = 6;
  double own_piece_amount = 7;

  int32 cross_transaction_count = 8;
  int32 cross_piece_count = 9;
  double cross_piece_amount = 10;
}

message HistoryStockOrderCancelMetric {
  common.v1.StatTimeType time_type = 1;
  repeated HistoryStockOrderCancelItem items = 2;
}

