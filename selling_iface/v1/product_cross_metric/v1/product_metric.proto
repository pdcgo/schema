syntax = "proto3";
package selling_iface.v1.product_cross_metric.v1;

import "selling_iface/v1/metric_opts/v1/metric_options.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/product_cross_metric/v1;product_cross_metric";

message CommonProductCrossItem {
  string product_name = 1 [(selling_iface.v1.metric_opts.v1.csv_name) = "Nama Produk"];
  string product_ref_id = 2 [(selling_iface.v1.metric_opts.v1.csv_name) = "Sku Produk"];
}

message CommonProductCrossMetric {
  map<uint64, CommonProductCrossItem> data = 1;
}

enum CommonProductCrossSort {
  COMMON_PRODUCT_CROSS_SORT_UNSPECIFIED = 0;
  COMMON_PRODUCT_CROSS_SORT_NAME = 1;
  COMMON_PRODUCT_CROSS_SORT_REF_ID = 2;
}

message CostProductItem {
  uint64 product_id = 1;

  int64 transaction_count = 2 [(selling_iface.v1.metric_opts.v1.csv_name) = "Jumlah Transaksi"];
  int64 piece_count = 4 [(selling_iface.v1.metric_opts.v1.csv_name) = "Jumlah PCS"];
  double cost_amount = 5 [(selling_iface.v1.metric_opts.v1.csv_name) = "Total Modal"];
}

message CostProductMetric {
  map<uint64, CostProductItem> data = 1;
}

enum CostProductMetricSort {
  COST_PRODUCT_METRIC_SORT_UNSPECIFIED = 0;
  COST_PRODUCT_METRIC_SORT_COST_AMOUNT = 1;
  COST_PRODUCT_METRIC_SORT_PIECE_COUNT = 2;
  COST_PRODUCT_METRIC_SORT_TRANSACTION_COUNT = 3;
}
