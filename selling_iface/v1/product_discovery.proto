syntax = "proto3";
package selling_iface.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1;selling_iface";

service ProductDiscoveryService {
  rpc SearchProduct(SearchProductRequest) returns (SearchProductResponse);
  rpc ProductDetail(ProductDetailRequest) returns (ProductDetailResponse);
}

message ProductDetailRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}
message ProductDetailResponse {}

enum SearchProductSort {
  SEARCH_PRODUCT_SORT_UNSPECIFIED = 0;
  SEARCH_PRODUCT_SORT_NEWEST = 1;
  SEARCH_PRODUCT_SORT_OLDEST = 2;
  SEARCH_PRODUCT_SORT_PRICE_LOWEST = 3;
  SEARCH_PRODUCT_SORT_PRICE_HIGHEST = 4;
  SEARCH_PRODUCT_SORT_STOCK_LOWEST = 5;
  SEARCH_PRODUCT_SORT_STOCK_HIGHEST = 6;
  //   SEARCH_PRODUCT_SORT_SALES_LOWEST = 7;
  //   SEARCH_PRODUCT_SORT_SALES_HIGHEST = 8;
}

message CategoryFilter {
  int32 level = 1;
  int32 category_id = 2;
}

message PriceRangeFilter {
  double min_price = 1;
  double max_price = 2;
}

message StockRangeFilter {
  uint64 min_stock = 1;
  uint64 max_stock = 2;
}

message SearchProductFilter {
  oneof search_by {
    string product_name = 1;
    string sku_id = 2;
  }
  bool is_priority = 3;
  bool is_locked = 4;
  uint64 warehouse_id = 5;
  uint64 team_id = 6;
  uint64 user_id = 7;
  CategoryFilter category = 8;
  PriceRangeFilter price_range = 9;
  StockRangeFilter stock_range = 10;
  repeated string tags = 11;

  oneof stock_condition {
    bool only_ready_stock = 12;
    bool only_out_of_stock = 13;
  }
}

message ProductListItem {
  uint64 id = 1;

  string image = 2;
  string name = 3;
}

message SearchProductRequest {
  SearchProductSort sort = 1;
  SearchProductFilter filter = 2;
  common.v1.PageFilter page = 3 [(buf.validate.field).required = true];
}

message SearchProductResponse {
  repeated ProductListItem data = 1;
  common.v1.PageInfo page_info = 2;
}
