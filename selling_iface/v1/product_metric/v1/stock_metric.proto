syntax = "proto3";
package selling_iface.v1.product_metric.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/product_metric/v1;product_metric";

message RestockAcceptedItem {
  uint64 product_id = 1;

  int64 transaction_count = 2;
  int64 piece_count = 4;
  double cost_amount = 5;
  double product_amount = 6;
  double total_amount = 7;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp last_arrived = 8;
}

message RestockAcceptedMetric {
  map<uint64, RestockAcceptedItem> data = 1;
}

enum RestockAcceptedMetricSort {
  RESTOCK_ACCEPTED_METRIC_SORT_UNSPECIFIED = 0;
  RESTOCK_ACCEPTED_METRIC_SORT_PIECE_COUNT = 1;
  RESTOCK_ACCEPTED_METRIC_SORT_LAST_ARRIVED = 2;
  RESTOCK_ACCEPTED_METRIC_SORT_TOTAL_AMOUNT = 3;
  RESTOCK_ACCEPTED_METRIC_SORT_COST_AMOUNT = 4;
  RESTOCK_ACCEPTED_METRIC_SORT_PRODUCT_AMOUNT = 5;
  RESTOCK_ACCEPTED_METRIC_SORT_TRANSACTION_COUNT = 6;
}

message RestockCreatedItem {
  uint64 product_id = 1;

  int64 transaction_count = 2;
  double transaction_amount = 3;
  int64 piece_count = 4;
  double total_amount = 5;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp last_created = 6;
}

message RestockCreatedMetric {
  map<uint64, RestockCreatedItem> data = 1;
}

enum RestockCreatedMetricSort {
  RESTOCK_CREATED_METRIC_SORT_UNSPECIFIED = 0;
  RESTOCK_CREATED_METRIC_SORT_PIECE_COUNT = 1;
  RESTOCK_CREATED_METRIC_SORT_LAST_CREATED = 2;
  RESTOCK_CREATED_METRIC_SORT_TOTAL_AMOUNT = 3;
  RESTOCK_CREATED_METRIC_SORT_TRANSACTION_COUNT = 4;
  RESTOCK_CREATED_METRIC_SORT_TRANSACTION_AMOUNT = 5;
}

message RestockCancelledItem {
  uint64 product_id = 1;

  int64 transaction_count = 2;
  double transaction_amount = 3;
  int64 piece_count = 4;
  double total_amount = 5;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp last_cancelled = 6;
}

message RestockCancelledMetric {
  map<uint64, RestockCancelledItem> data = 1;
}

enum RestockCancelledMetricSort {
  RESTOCK_CANCELLED_METRIC_SORT_UNSPECIFIED = 0;
  RESTOCK_CANCELLED_METRIC_SORT_PIECE_COUNT = 1;
  RESTOCK_CANCELLED_METRIC_SORT_LAST_CANCELLED = 2;
