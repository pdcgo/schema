syntax = "proto3";
package selling_iface.v1;

import "buf/validate/validate.proto";
import "common/v1/stat.proto";
import "selling_iface/v1/metric.proto";
import "selling_iface/v1/metric_order.proto";
import "selling_iface/v1/metric_product.proto";
import "selling_iface/v1/metric_stock.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1;selling_iface";

service SellingStatService {
  rpc Stat(StatRequest) returns (StatResponse);
  rpc StatStream(StatStreamRequest) returns (stream StatStreamResponse);
}

message TotalStockMetric {
  MetricType type = 1;
  uint64 total_count = 2;
  uint64 total_sku_count = 3;
  double total_amount = 4;
}

message OngoingStockMetric {
  MetricType type = 1;
  uint64 total_count = 2;
  uint64 total_sku_count = 3;
  double total_amount = 4;

  uint64 return_count = 5;
  uint64 return_sku_count = 6;
  double return_amount = 7;

  uint64 restock_count = 8;
  uint64 restock_sku_count = 9;
  double restock_amount = 10;

  uint64 adj_restock_count = 11;
  uint64 adj_restock_sku_count = 12;
  double adj_restock_amount = 13;

  uint64 transfer_in_count = 14;
  uint64 transfer_in_sku_count = 15;
  double transfer_in_amount = 16;
}

message ReadyStockMetric {
  MetricType type = 1;
  uint64 total_count = 2;
  uint64 total_sku_count = 3;
  double total_amount = 4;
}

message PayableMetric {
  MetricType type = 1;
  int64 invoice_count = 2;
  double amount = 3;
}

message ReceivableMetric {
  MetricType type = 1;
  int64 invoice_count = 2;
  double amount = 3;
}

message Metric {
  oneof data {
    TotalStockMetric total_stock = 1;
    OngoingStockMetric ongoing_stock = 2;
    ReadyStockMetric ready_stock = 3;
    PayableMetric payable = 4;
    ReceivableMetric receivable = 5;
    ProductSoldMetric product_sold = 6;
    HistoryProductSoldMetric history_product_sold = 7;
    OrderActiveMetric order_active = 8;
    HistoryOrderMetric history_order = 9;
    TopProductSoldMetric top_product_sold = 10;
    TopProductUnsoldMetric top_product_unsold = 11;
    HistoryRestockMetric history_restock = 12;
    HistoryReturnMetric history_return = 13;
    HistoryStockResolutionMetric history_stock_resolution = 14;
    HistoryStockOrderMetric history_stock_order = 15;
    HistoryShipmentProblemMetric history_shipment_problem = 16;
    HistoryWarehouseProblemMetric history_warehouse_problem = 17;
    HistoryReadyStockMetric history_ready_stock = 18;
  }
}

message ProductFilter {
  uint64 product_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message StatFilter {
  uint64 team_id = 1;
  int32 top_n = 2;
  uint64 warehouse_id = 3;
  ProductFilter product_filter = 4;
}

message StatRequest {
  common.v1.StatTimeRange range = 1 [(buf.validate.field).required = true];
  StatFilter filter = 2;
  repeated MetricType metric_types = 3 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 10
    unique: true
  }];
}

message StatResponse {
  repeated Metric metrics = 1;
}

message StatStreamRequest {
  common.v1.StatTimeRange range = 1 [(buf.validate.field).required = true];
  StatFilter filter = 2;
  repeated MetricType metric_types = 3 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    unique: true
  }];
}

message StatStreamResponse {
  Metric metric = 1;
}
