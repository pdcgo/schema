syntax = "proto3";
package selling_iface.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "selling_iface/v1/shop_metric/v1/order_metric.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1;selling_iface";

enum ShopMetricType {
  SHOP_METRIC_TYPE_UNSPECIFIED = 0;
  SHOP_METRIC_TYPE_ORDER = 1;
  SHOP_METRIC_TYPE_ORDER_COMPLETED = 8;
  SHOP_METRIC_TYPE_ORDER_CANCELLED = 9;
  SHOP_METRIC_TYPE_ADS_EXPENSE = 2;
  SHOP_METRIC_TYPE_RETURN_CREATED = 3;
  SHOP_METRIC_TYPE_RETURN_ARRIVED = 10;
  SHOP_METRIC_TYPE_RETURN_CANCELLED = 11;
  SHOP_METRIC_TYPE_HOLD_AMOUNT = 4;
  SHOP_METRIC_TYPE_PRODUCT_COST = 5;
  SHOP_METRIC_TYPE_EXPORT_WITHDRAWAL = 6;
  SHOP_METRIC_TYPE_REAL_REVENUE = 7;
}

enum ShopMetricSortType {
  SHOP_METRIC_SORT_TYPE_UNSPECIFIED = 0;
  SHOP_METRIC_SORT_TYPE_ASC = 1;
  SHOP_METRIC_SORT_TYPE_DESC = 2;
}

enum CommonShopSort {
  COMMON_SHOP_SORT_UNSPECIFIED = 0;
  COMMON_SHOP_SORT_NAME = 1;
  COMMON_SHOP_SORT_USERNAME = 2;
}

message ShopMetricSort {
  ShopMetricSortType sort_type = 1;
  oneof s {
    CommonShopSort common_sort = 2;
    selling_iface.v1.shop_metric.v1.ShopOrderMetricSort shop_order_metric_sort = 3;
    selling_iface.v1.shop_metric.v1.ShopOrderCompletedMetricSort shop_order_completed_metric_sort = 7;
    selling_iface.v1.shop_metric.v1.ShopOrderCancelledMetricSort shop_order_cancelled_metric_sort = 8;
    selling_iface.v1.shop_metric.v1.ShopReturnMetricSort shop_return_metric_sort = 9;
    selling_iface.v1.shop_metric.v1.ShopReturnArrivedMetricSort shop_return_arrived_metric_sort = 10;
    selling_iface.v1.shop_metric.v1.ShopReturnCancelledMetricSort shop_return_cancelled_metric_sort = 11;
    selling_iface.v1.shop_metric.v1.ShopProductCostMetricSort shop_product_cost_metric_sort = 4;
    selling_iface.v1.shop_metric.v1.ShopAdsExpenseMetricSort shop_ads_expense_metric_sort = 5;
    selling_iface.v1.shop_metric.v1.ShopHoldAmountMetricSort shop_hold_amount_metric_sort = 6;
  }
}

message ShopMetric {
  oneof data {
    selling_iface.v1.shop_metric.v1.ShopOrderMetric shop_order_metric = 1;
    selling_iface.v1.shop_metric.v1.ShopOrderCompletedMetric shop_order_completed_metric = 5;
    selling_iface.v1.shop_metric.v1.ShopOrderCancelledMetric shop_order_cancelled_metric = 6;
    selling_iface.v1.shop_metric.v1.ShopReturnMetric shop_return_metric = 7;
    selling_iface.v1.shop_metric.v1.ShopReturnArrivedMetric shop_return_arrived_metric = 8;
    selling_iface.v1.shop_metric.v1.ShopReturnCancelledMetric shop_return_cancelled_metric = 9;
    selling_iface.v1.shop_metric.v1.ShopProductCostMetric shop_product_cost_metric = 2;
    selling_iface.v1.shop_metric.v1.ShopAdsExpenseMetric shop_ads_expense_metric = 3;
    selling_iface.v1.shop_metric.v1.ShopHoldAmountMetric shop_hold_amount_metric = 4;
  }
}

message ShopMetricExtra {}

message ShopStatMetricFilter {
  uint64 team_id = 1;
  uint64 warehouse_id = 2;
  string product_name = 3;
  common.v1.PageFilter page = 4;
  ShopStatTimeRange range = 5 [(buf.validate.field).required = true];
}
message ShopStatTimeRange {
  google.protobuf.Timestamp start = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp end = 2 [(buf.validate.field).required = true];
}

message ShopStatMetricRequest {
  ShopStatMetricFilter filter = 1 [(buf.validate.field).required = true];
  ShopMetricSort sort = 2 [(buf.validate.field).required = true];
  repeated ShopMetricExtra metric_extras = 3;
  repeated ShopMetricType metric_types = 4;
}

message ShopStatMetricResponse {
  repeated ShopMetric metrics = 1;
  repeated uint64 ids = 2;
}
