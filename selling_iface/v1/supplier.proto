syntax = "proto3";
package selling_iface.v1;

// import "accounting_iface/v1/core.proto";
// import "accounting_iface/v1/revenue.proto";
import "buf/validate/validate.proto";
import "common/v1/common.proto";
// import "common/v1/team.proto";
// import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1;selling_iface";

service SupplierService {
  rpc SupplierList(SupplierListRequest) returns (SupplierListResponse);
  rpc SupplierCreate(SupplierCreateRequest) returns (SupplierCreateResponse);
  rpc SupplierDelete(SupplierDeleteRequest) returns (SupplierDeleteResponse);
  rpc SupplierUpdate(SupplierUpdateRequest) returns (SupplierUpdateResponse);
  rpc SupplierGet(SupplierGetRequest) returns (SupplierGetResponse);
  rpc SupplierGetChild(SupplierGetChildRequest) returns (SupplierGetChildResponse);
}

enum SupplierType {
  SUPPLIER_TYPE_UNSPECIFIED = 0;
  SUPPLIER_TYPE_CUSTOM = 1;
  SUPPLIER_TYPE_MARKETPLACE = 2;
}

message SupplierCustom {
  string name = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string contact = 4 [(buf.validate.field).string = {pattern: "^\\+[1-9]\\d{1,14}$"}];
  string description = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
}

message SupplierMarketplace {
  common.v1.MarketplaceType mp_type = 1;

  uint64 id = 2;
  uint64 supplier_id = 3;
  string shop_name = 4;
  string product_name = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string uri = 6 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
  string description = 7 [(buf.validate.field).string = {
    min_len: 1
    max_len: 500
  }];
}

message SupplierDetail {
  uint64 id = 1;
  uint64 team_id = 2;
  string code = 3;

  string name = 4;
  string contact = 5;
  string description = 6;
  string address = 7;
  string province = 8;
  string city = 9;
}

message SupplierCreateRequest {
  uint64 team_id = 1 [(buf.validate.field).uint64.gt = 0];
  string code = 2;
  string name = 3;
  string contact = 4;
  string description = 5;
  string address = 6;
  string province = 7;
  string city = 8;
}

message SupplierCreateResponse {
  uint64 id = 1;
  SupplierDetail data = 2;
}

message SupplierListItem {
  uint64 id = 1;
  uint64 team_id = 2;
  string code = 3;

  string name = 4;
  string contact = 5;
  string description = 6;
  string address = 7;
  string province = 8;
  string city = 9;
}

message SupplierListRequest {
  string q = 1;
  uint64 team_id = 2;
  string province = 3;
  string city = 4;
  common.v1.PageFilter page = 5 [(buf.validate.field).required = true];
}

message SupplierListResponse {
  repeated SupplierListItem data = 1;
  common.v1.PageInfo page_info = 2;
}

message SupplierGetRequest {
  repeated uint64 ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      uint64: {gt: 0}
    }
  }];
}

message SupplierGetResponse {
  repeated SupplierDetail data = 1;
}

enum SupplierChildType {
  SUPPLIER_CHILD_TYPE_UNSPECIFIED = 0;
  SUPPLIER_CHILD_TYPE_DETAIL = 1;
  SUPPLIER_CHILD_TYPE_CHILD = 2;
}

message SupplierGetChildRequest {
  SupplierChildType type = 1;
  repeated uint64 ids = 2 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
    items: {
      uint64: {gt: 0}
    }
  }];
}

message SupplierGetChildResponse {
  repeated SupplierMarketplace data = 1;
}

enum SupplierChildUpdateType {
  SUPPLIER_CHILD_UPDATE_TYPE_UNSPECIFIED = 0;
  SUPPLIER_CHILD_UPDATE_TYPE_UPSERT = 1;
  SUPPLIER_CHILD_UPDATE_TYPE_REMOVE = 2;
}
message SupplierChildUpdate {
  uint64 id = 1;
  SupplierChildUpdateType type = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  SupplierMarketplace data = 3;
}

message SupplierDetailUpdate {
  string code = 1;
  string name = 2;
  string contact = 3;
  string description = 4;
  string address = 5;
  string province = 6;
  string city = 7;
}

message SupplierUpdateRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  oneof update {
    SupplierDetailUpdate detail = 2;
    SupplierChildUpdate child = 3;
  }
}
message SupplierUpdateResponse {}

message SupplierDeleteRequest {
  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}
message SupplierDeleteResponse {}
