syntax = "proto3";
package selling_iface.v1.supplier_metric.v1;

import "selling_iface/v1/metric_opts/v1/metric_options.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/supplier_metric/v1;supplier_metric";

message CommonSupplierItem {
  string product_name = 1 [(selling_iface.v1.metric_opts.v1.csv_name) = "Nama Produk"];
  string product_ref_id = 2 [(selling_iface.v1.metric_opts.v1.csv_name) = "Sku Produk"];
}

message CommonSupplierMetric {
  map<uint64, CommonSupplierItem> data = 1;
}

enum CommonSupplierSort {
  COMMON_SUPPLIER_SORT_UNSPECIFIED = 0;
  COMMON_SUPPLIER_SORT_NAME = 1;
  COMMON_SUPPLIER_SORT_CODE = 2;
}

message SupplierOrderItem {
  uint64 supplier_id = 1;
  int64 transaction_count = 2;
  int64 piece_count = 3;
  double total_amount = 4;
}

message SupplierOrderMetric {
  map<uint64, SupplierOrderItem> data = 1;
}

enum SupplierOrderMetricSort {
  SUPPLIER_ORDER_METRIC_SORT_UNSPECIFIED = 0;
  SUPPLIER_ORDER_METRIC_SORT_TRANSACTION_COUNT = 1;
  SUPPLIER_ORDER_METRIC_SORT_PIECE_COUNT = 2;
  SUPPLIER_ORDER_METRIC_SORT_TOTAL_AMOUNT = 3;
}
