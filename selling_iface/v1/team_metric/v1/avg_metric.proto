  uint64 team_id = 1;
  double piece_per_transaction = 2;
  double total_per_transaction = 3;
}

message TeamAvgOrderMetric {
  map<uint64, TeamAvgOrderItem> data = 1;
}

enum TeamAvgOrderMetricSort {
  TEAM_AVG_ORDER_METRIC_SORT_UNSPECIFIED = 0;
  TEAM_AVG_ORDER_METRIC_SORT_PIECE_PER_TRANSACTION = 1;
  TEAM_AVG_ORDER_METRIC_SORT_TOTAL_PER_TRANSACTION = 2;
}

