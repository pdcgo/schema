syntax = "proto3";
package selling_iface.v1.team_metric.v1;

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/team_metric/v1;team_metric";

message TeamWithdrawalItem {
  uint64 team_id = 1;
  double withdrawal_fund_amount = 2;
  double withdrawal_adjustment_amount = 3;
  double withdrawal_total_amount = 4;
}

message TeamWithdrawalMetric {
  map<uint64, TeamWithdrawalItem> data = 1;
}

enum TeamWithdrawalMetricSort {
  TEAM_WITHDRAWAL_METRIC_SORT_UNSPECIFIED = 0;
  TEAM_WITHDRAWAL_METRIC_SORT_WITHDRAWAL_FUND_AMOUNT = 1;
  TEAM_WITHDRAWAL_METRIC_SORT_WITHDRAWAL_ADJUSTMENT_AMOUNT = 2;
  TEAM_WITHDRAWAL_METRIC_SORT_WITHDRAWAL_TOTAL_AMOUNT = 3;
}

message TeamWithdrawalBreakdownItem {
  uint64 team_id = 1;
  double aff_commission_amount = 2;
  double premi_amount = 3;
  double packaging_amount = 4;
  double return_adj_amount = 5;
  double shipping_adj_amount = 6;
  double compensation_amount = 7;
  double lost_compensation_amount = 8;
  double unknown_amount = 9;
  double order_fund_amount = 10;
  double unknown_adj_amount = 11;
  double total_amount = 12;
}

message TeamWithdrawalBreakdownMetric {
  map<uint64, TeamWithdrawalBreakdownItem> data = 1;
}

enum TeamWithdrawalBreakdownMetricSort {
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_UNSPECIFIED = 0;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_AFF_COMMISSION_AMOUNT = 1;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_PREMI_AMOUNT = 2;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_PACKAGING_AMOUNT = 3;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_RETURN_ADJ_AMOUNT = 4;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_SHIPPING_ADJ_AMOUNT = 5;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_COMPENSATION_AMOUNT = 6;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_LOST_COMPENSATION_AMOUNT = 7;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_UNKNOWN_AMOUNT = 8;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_ORDER_FUND_AMOUNT = 9;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_UNKNOWN_ADJ_AMOUNT = 10;
  TEAM_WITHDRAWAL_BREAKDOWN_METRIC_SORT_TOTAL_AMOUNT = 11;
}

message TeamRevenueOrderItem {
  uint64 team_id = 1;
  double revenue_amount = 2;
}

message TeamRevenueOrderMetric {
  map<uint64, TeamRevenueOrderItem> data = 1;
}

enum TeamRevenueOrderMetricSort {
  TEAM_REVENUE_ORDER_METRIC_SORT_UNSPECIFIED = 0;
  TEAM_REVENUE_ORDER_METRIC_SORT_REVENUE_AMOUNT = 1;
}

message TeamRevenueWarehouseAdjustmentItem {
  uint64 team_id = 1;
  double warehouse_adjustment_amount = 2;
}

message TeamRevenueWarehouseAdjustmentMetric {
  map<uint64, TeamRevenueWarehouseAdjustmentItem> data = 1;
}

enum TeamRevenueWarehouseAdjustmentMetricSort {
  TEAM_REVENUE_WAREHOUSE_ADJUSTMENT_METRIC_SORT_UNSPECIFIED = 0;
  TEAM_REVENUE_WAREHOUSE_ADJUSTMENT_METRIC_SORT_WAREHOUSE_ADJUSTMENT_AMOUNT = 1;
}

message TeamRevenueProductAdjustmentItem {
  uint64 team_id = 1;
  double product_adjustment_amount = 2;
}

message TeamRevenueProductAdjustmentMetric {
  map<uint64, TeamRevenueProductAdjustmentItem> data = 1;
}

enum TeamRevenueProductAdjustmentMetricSort {
  TEAM_REVENUE_PRODUCT_ADJUSTMENT_METRIC_SORT_UNSPECIFIED = 0;
  TEAM_REVENUE_PRODUCT_ADJUSTMENT_METRIC_SORT_PRODUCT_ADJUSTMENT_AMOUNT = 1;
}
