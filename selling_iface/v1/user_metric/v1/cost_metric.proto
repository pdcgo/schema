syntax = "proto3";
package selling_iface.v1.user_metric.v1;

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/user_metric/v1;user_metric";

message UserCostWarehouseItem {
  uint64 user_id = 1;
  double warehouse_amount = 2;
}

message UserCostWarehouseMetric {
  map<uint64, UserCostWarehouseItem> data = 1;
}

enum UserCostWarehouseMetricSort {
  USER_COST_WAREHOUSE_METRIC_SORT_UNSPECIFIED = 0;
  USER_COST_WAREHOUSE_METRIC_SORT_WAREHOUSE_AMOUNT = 1;
}

message UserCostProductOwnItem {
  uint64 user_id = 1;
  double product_own_amount = 2;
}

message UserCostProductOwnMetric {
  map<uint64, UserCostProductOwnItem> data = 1;
}

enum UserCostProductOwnMetricSort {
  USER_COST_PRODUCT_OWN_METRIC_SORT_UNSPECIFIED = 0;
  USER_COST_PRODUCT_OWN_METRIC_SORT_PRODUCT_OWN_AMOUNT = 1;
}

message UserCostProductCrossItem {
  uint64 user_id = 1;
  double product_cross_amount = 2;
}

message UserCostProductCrossMetric {
  map<uint64, UserCostProductCrossItem> data = 1;
}

enum UserCostProductCrossMetricSort {
  USER_COST_PRODUCT_CROSS_METRIC_SORT_UNSPECIFIED = 0;
  USER_COST_PRODUCT_CROSS_METRIC_SORT_PRODUCT_CROSS_AMOUNT = 1;
}

message UserAdsExpenseItem {
  uint64 user_id = 1;
  double ads_amount = 2;
}

message UserAdsExpenseMetric {
  map<uint64, UserAdsExpenseItem> data = 1;
}

enum UserAdsExpenseMetricSort {
  USER_ADS_EXPENSE_METRIC_SORT_UNSPECIFIED = 0;
  USER_ADS_EXPENSE_METRIC_SORT_ADS_AMOUNT = 1;
}
