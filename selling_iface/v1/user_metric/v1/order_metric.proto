}

enum UserOrderCompletedMetricSort {
  USER_ORDER_COMPLETED_METRIC_SORT_UNSPECIFIED = 0;
  USER_ORDER_COMPLETED_METRIC_SORT_TRANSACTION_COUNT = 1;
  USER_ORDER_COMPLETED_METRIC_SORT_TOTAL_AMOUNT = 2;
