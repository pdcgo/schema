syntax = "proto3";
package selling_iface.v1.user_metric.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/user_metric/v1;user_metric";

message UserOrderItem {
  uint64 user_id = 1;
  int64 transaction_count = 2;
  double total_amount = 4;
  double mp_total_amount = 5;
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp last_order_created = 6;
}

message UserOrderMetric {
  map<uint64, UserOrderItem> data = 1;
}

enum UserOrderMetricSort {
  USER_ORDER_METRIC_SORT_UNSPECIFIED = 0;
  USER_ORDER_METRIC_SORT_TRANSACTION_COUNT = 1;
  USER_ORDER_METRIC_SORT_TOTAL_AMOUNT = 2;
  USER_ORDER_METRIC_SORT_MP_TOTAL_AMOUNT = 3;
  USER_ORDER_METRIC_SORT_LAST_ORDER_CREATED = 4;
}

