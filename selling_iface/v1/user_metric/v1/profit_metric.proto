syntax = "proto3";
package selling_iface.v1.user_metric.v1;

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/user_metric/v1;user_metric";

message UserProfitOrderCreatedItem {
  uint64 user_id = 1;
  double profit_created_amount = 2;
  double profit_created_percent = 3;
}

message UserProfitOrderCreatedMetric {
  map<uint64, UserProfitOrderCreatedItem> data = 1;
}

enum UserProfitOrderCreatedMetricSort {
  USER_PROFIT_ORDER_CREATED_METRIC_SORT_UNSPECIFIED = 0;
  USER_PROFIT_ORDER_CREATED_METRIC_SORT_PROFIT_CREATED_AMOUNT = 1;
  USER_PROFIT_ORDER_CREATED_METRIC_SORT_PROFIT_CREATED_PERCENT = 2;
}

message UserProfitOrderWithdrawalItem {
  uint64 user_id = 1;
  double profit_withdrawal_amount = 2;
  double profit_withdrawal_percent = 3;
  double profit_withdrawal_adjustment_amount = 4;
  double profit_withdrawal_adjustment_percent = 5;
}

message UserProfitOrderWithdrawalMetric {
  map<uint64, UserProfitOrderWithdrawalItem> data = 1;
}

enum UserProfitOrderWithdrawalMetricSort {
  USER_PROFIT_ORDER_WITHDRAWAL_METRIC_SORT_UNSPECIFIED = 0;
  USER_PROFIT_ORDER_WITHDRAWAL_METRIC_SORT_PROFIT_WITHDRAWAL_AMOUNT = 1;
  USER_PROFIT_ORDER_WITHDRAWAL_METRIC_SORT_PROFIT_WITHDRAWAL_PERCENT = 2;
  USER_PROFIT_ORDER_WITHDRAWAL_METRIC_SORT_PROFIT_WITHDRAWAL_ADJUSTMENT_AMOUNT = 3;
  USER_PROFIT_ORDER_WITHDRAWAL_METRIC_SORT_PROFIT_WITHDRAWAL_ADJUSTMENT_PERCENT = 4;
}

message UserLostProfitOrderItem {
  uint64 user_id = 1;
  double lost_profit_amount = 2;
}

message UserLostProfitOrderMetric {
  map<uint64, UserLostProfitOrderItem> data = 1;
}

enum UserLostProfitOrderMetricSort {
  USER_LOST_PROFIT_ORDER_METRIC_SORT_UNSPECIFIED = 0;
  USER_LOST_PROFIT_ORDER_METRIC_SORT_LOST_PROFIT_AMOUNT = 1;
}

message UserProfitOrLossItem {
  uint64 user_id = 1;
  double profit_or_loss_amount = 2;
}

message UserProfitOrLossMetric {
  map<uint64, UserProfitOrLossItem> data = 1;
}

enum UserProfitOrLossMetricSort {
  USER_PROFIT_OR_LOSS_METRIC_SORT_UNSPECIFIED = 0;
  USER_PROFIT_OR_LOSS_METRIC_SORT_PROFIT_OR_LOSS_AMOUNT = 1;
}
