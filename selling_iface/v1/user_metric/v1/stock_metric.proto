syntax = "proto3";
package selling_iface.v1.user_metric.v1;

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1/user_metric/v1;user_metric";

message UserStockOrderItem {
  uint64 user_id = 1;
  int64 piece_count = 2;
  int64 own_piece_count = 4;
  int64 cross_piece_count = 5;
  double piece_amount = 3;
  double own_piece_amount = 6;
  double cross_piece_amount = 7;
}

message UserStockOrderMetric {
  map<uint64, UserStockOrderItem> data = 1;
}

enum UserStockOrderMetricSort {
  USER_STOCK_ORDER_METRIC_SORT_UNSPECIFIED = 0;
  USER_STOCK_ORDER_METRIC_SORT_PIECE_COUNT = 1;
  USER_STOCK_ORDER_METRIC_SORT_OWN_PIECE_COUNT = 3;
  USER_STOCK_ORDER_METRIC_SORT_CROSS_PIECE_COUNT = 4;
  USER_STOCK_ORDER_METRIC_SORT_PIECE_AMOUNT = 2;
  USER_STOCK_ORDER_METRIC_SORT_OWN_PIECE_AMOUNT = 5;
  USER_STOCK_ORDER_METRIC_SORT_CROSS_PIECE_AMOUNT = 6;
}
