message UserMetricExtra {}

message UserStatMetricFilter {
  uint64 team_id = 1;
  common.v1.PageFilter page = 4;
  UserStatTimeRange range = 5 [(buf.validate.field).required = true];
}
message UserStatTimeRange {
  google.protobuf.Timestamp start = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp end = 2 [(buf.validate.field).required = true];
}

message UserStatMetricRequest {
  UserStatMetricFilter filter = 1 [(buf.validate.field).required = true];
  UserMetricSort sort = 2 [(buf.validate.field).required = true];
  repeated UserMetricExtra metric_extras = 3;
  repeated UserMetricType metric_types = 4;
}

message UserStatMetricResponse {
  repeated UserMetric metrics = 1;
  repeated uint64 ids = 2;
}
