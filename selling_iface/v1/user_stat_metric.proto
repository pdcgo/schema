syntax = "proto3";
package selling_iface.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";
import "selling_iface/v1/user_metric/v1/order_metric.proto";
import "selling_iface/v1/user_metric/v1/stock_metric.proto";
import "selling_iface/v1/user_metric/v1/cost_metric.proto";
import "selling_iface/v1/user_metric/v1/revenue_metric.proto";
import "selling_iface/v1/user_metric/v1/profit_metric.proto";

option go_package = "github.com/pdcgo/schema/services/selling_iface/v1;selling_iface";

enum UserMetricType {
  USER_METRIC_TYPE_UNSPECIFIED = 0;
  // order
  USER_METRIC_TYPE_ORDER = 1;
  USER_METRIC_TYPE_ORDER_WITHDRAWAL = 4;
  USER_METRIC_TYPE_ORDER_CANCELLED = 5;
  USER_METRIC_TYPE_ORDER_LOST = 21;
  USER_METRIC_TYPE_ORDER_COMPLETED = 24;
  USER_METRIC_TYPE_ORDER_RETURN = 28;
  USER_METRIC_TYPE_ORDER_RETURN_COMPLETED = 29;
  USER_METRIC_TYPE_ORDER_ONGOING = 36;
  // stock order
  USER_METRIC_TYPE_STOCK_ORDER = 2;
  // avg order
  USER_METRIC_TYPE_AVG_ORDER = 3;
  USER_METRIC_TYPE_AVG_ORDER_WITHDRAWAL = 8;
  USER_METRIC_TYPE_AVG_ORDER_CANCELLED = 9;
  USER_METRIC_TYPE_AVG_ORDER_LOST = 19;
  USER_METRIC_TYPE_AVG_ORDER_COMPLETED = 26;
  USER_METRIC_TYPE_AVG_ORDER_RETURN = 32;
  USER_METRIC_TYPE_AVG_ORDER_RETURN_COMPLETED = 33;
  USER_METRIC_TYPE_AVG_ORDER_ONGOING = 38;
  // cost order
  USER_METRIC_TYPE_COST_WAREHOUSE = 10;
  USER_METRIC_TYPE_COST_PRODUCT_OWN = 42;
  USER_METRIC_TYPE_COST_PRODUCT_CROSS = 43;
  USER_METRIC_TYPE_ADS_EXPENSE = 22;
  // profit
  USER_METRIC_TYPE_PROFIT_ORDER_CREATED = 14;
  USER_METRIC_TYPE_PROFIT_ORDER_WITHDRAWAL = 16;
  USER_METRIC_TYPE_LOST_PROFIT_ORDER = 17;
  USER_METRIC_TYPE_PROFIT_OR_LOSS = 23;
  // revenue
  USER_METRIC_TYPE_WITHDRAWAL = 13;
  USER_METRIC_TYPE_WITHDRAWAL_BREAKDOWN = 40;
  USER_METRIC_TYPE_REVENUE_ORDER = 44;
  USER_METRIC_TYPE_REVENUE_WAREHOUSE_ADJUSTMENT = 45;
  USER_METRIC_TYPE_REVENUE_PRODUCT_ADJUSTMENT = 46;
}

enum UserMetricSortType {
  USER_METRIC_SORT_TYPE_UNSPECIFIED = 0;
  USER_METRIC_SORT_TYPE_ASC = 1;
  USER_METRIC_SORT_TYPE_DESC = 2;
}

enum CommonUserSort {
  COMMON_USER_SORT_UNSPECIFIED = 0;
  COMMON_USER_SORT_NAME = 1;
  COMMON_USER_SORT_USERNAME = 2;
}

message UserMetricSort {
  UserMetricSortType sort_type = 1;
  oneof s {
    CommonUserSort common_sort = 2;
    // order
    selling_iface.v1.user_metric.v1.UserOrderMetricSort user_order_metric_sort = 3;
    selling_iface.v1.user_metric.v1.UserOrderWithdrawalMetricSort user_order_withdrawal_metric_sort = 6;
    selling_iface.v1.user_metric.v1.UserOrderCancelledMetricSort user_order_cancelled_metric_sort = 7;
    selling_iface.v1.user_metric.v1.UserOrderLostMetricSort user_order_lost_metric_sort = 19;
    selling_iface.v1.user_metric.v1.UserOrderCompletedMetricSort user_order_completed_metric_sort = 25;
    selling_iface.v1.user_metric.v1.UserOrderReturnMetricSort user_order_return_metric_sort = 29;
    selling_iface.v1.user_metric.v1.UserOrderReturnCompletedMetricSort user_order_return_completed_metric_sort = 30;
    selling_iface.v1.user_metric.v1.UserOrderOngoingMetricSort user_order_ongoing_metric_sort = 37;
    // stock order
    selling_iface.v1.user_metric.v1.UserStockOrderMetricSort user_stock_order_metric_sort = 4;
    // avg order
    selling_iface.v1.user_metric.v1.UserAvgOrderMetricSort user_avg_order_metric_sort = 5;
    selling_iface.v1.user_metric.v1.UserAvgOrderWithdrawalMetricSort user_avg_order_withdrawal_metric_sort = 10;
    selling_iface.v1.user_metric.v1.UserAvgOrderCancelledMetricSort user_avg_order_cancelled_metric_sort = 11;
    selling_iface.v1.user_metric.v1.UserAvgOrderLostMetricSort user_avg_order_lost_metric_sort = 21;
    selling_iface.v1.user_metric.v1.UserAvgOrderCompletedMetricSort user_avg_order_completed_metric_sort = 27;
    selling_iface.v1.user_metric.v1.UserAvgOrderReturnMetricSort user_avg_order_return_metric_sort = 33;
    selling_iface.v1.user_metric.v1.UserAvgOrderReturnCompletedMetricSort user_avg_order_return_completed_metric_sort = 34;
    selling_iface.v1.user_metric.v1.UserAvgOrderOngoingMetricSort user_avg_order_ongoing_metric_sort = 39;
    // cost order
    selling_iface.v1.user_metric.v1.UserCostWarehouseMetricSort user_cost_warehouse_metric_sort = 12;
    selling_iface.v1.user_metric.v1.UserCostProductOwnMetricSort user_cost_product_own_metric_sort = 42;
    selling_iface.v1.user_metric.v1.UserCostProductCrossMetricSort user_cost_product_cross_metric_sort = 43;
    // profit order
    selling_iface.v1.user_metric.v1.UserProfitOrderCreatedMetricSort user_profit_order_created_metric_sort = 16;
    selling_iface.v1.user_metric.v1.UserProfitOrderWithdrawalMetricSort user_profit_order_withdrawal_metric_sort = 17;
    selling_iface.v1.user_metric.v1.UserLostProfitOrderMetricSort user_lost_profit_order_metric_sort = 18;
    selling_iface.v1.user_metric.v1.UserProfitOrLossMetricSort user_profit_or_loss_metric_sort = 24;
    // revenue
    selling_iface.v1.user_metric.v1.UserAdsExpenseMetricSort user_ads_expense_metric_sort = 23;
    selling_iface.v1.user_metric.v1.UserWithdrawalMetricSort user_withdrawal_metric_sort = 15;
    selling_iface.v1.user_metric.v1.UserWithdrawalBreakdownMetricSort user_withdrawal_breakdown_metric_sort = 41;
    selling_iface.v1.user_metric.v1.UserRevenueOrderMetricSort user_revenue_order_metric_sort = 44;
    selling_iface.v1.user_metric.v1.UserRevenueWarehouseAdjustmentMetricSort user_revenue_warehouse_adjustment_metric_sort = 45;
    selling_iface.v1.user_metric.v1.UserRevenueProductAdjustmentMetricSort user_revenue_product_adjustment_metric_sort = 46;
  }
}

message UserMetric {
  oneof data {
    // order
    selling_iface.v1.user_metric.v1.UserOrderMetric user_order_metric = 2;
    selling_iface.v1.user_metric.v1.UserOrderWithdrawalMetric user_order_withdrawal_metric = 5;
    selling_iface.v1.user_metric.v1.UserOrderCancelledMetric user_order_cancelled_metric = 6;
    selling_iface.v1.user_metric.v1.UserOrderLostMetric user_order_lost_metric = 18;
    selling_iface.v1.user_metric.v1.UserOrderCompletedMetric user_order_completed_metric = 24;
    selling_iface.v1.user_metric.v1.UserOrderReturnMetric user_order_return_metric = 28;
    selling_iface.v1.user_metric.v1.UserOrderReturnCompletedMetric user_order_return_completed_metric = 29;
    selling_iface.v1.user_metric.v1.UserOrderOngoingMetric user_order_ongoing_metric = 36;
    // stock order
    selling_iface.v1.user_metric.v1.UserStockOrderMetric user_stock_order_metric = 3;
    // avg order
    selling_iface.v1.user_metric.v1.UserAvgOrderMetric user_avg_order_metric = 4;
    selling_iface.v1.user_metric.v1.UserAvgOrderWithdrawalMetric user_avg_order_withdrawal_metric = 9;
    selling_iface.v1.user_metric.v1.UserAvgOrderCancelledMetric user_avg_order_cancelled_metric = 10;
    selling_iface.v1.user_metric.v1.UserAvgOrderLostMetric user_avg_order_lost_metric = 20;
    selling_iface.v1.user_metric.v1.UserAvgOrderCompletedMetric user_avg_order_completed_metric = 26;
    selling_iface.v1.user_metric.v1.UserAvgOrderReturnMetric user_avg_order_return_metric = 32;
    selling_iface.v1.user_metric.v1.UserAvgOrderReturnCompletedMetric user_avg_order_return_completed_metric = 33;
    selling_iface.v1.user_metric.v1.UserAvgOrderOngoingMetric user_avg_order_ongoing_metric = 38;
    // cost order
    selling_iface.v1.user_metric.v1.UserCostWarehouseMetric user_cost_warehouse_metric = 11;
    selling_iface.v1.user_metric.v1.UserCostProductOwnMetric user_cost_product_own_metric = 42;
    selling_iface.v1.user_metric.v1.UserCostProductCrossMetric user_cost_product_cross_metric = 43;
    // profit
    selling_iface.v1.user_metric.v1.UserProfitOrderCreatedMetric user_profit_order_created_metric = 15;
    selling_iface.v1.user_metric.v1.UserProfitOrderWithdrawalMetric user_profit_order_withdrawal_metric = 16;
    selling_iface.v1.user_metric.v1.UserLostProfitOrderMetric user_lost_profit_order_metric = 17;
    selling_iface.v1.user_metric.v1.UserProfitOrLossMetric user_profit_or_loss_metric = 23;
    // revenue
    selling_iface.v1.user_metric.v1.UserWithdrawalMetric user_withdrawal_metric = 14;
    selling_iface.v1.user_metric.v1.UserWithdrawalBreakdownMetric user_withdrawal_breakdown_metric = 40;
    selling_iface.v1.user_metric.v1.UserRevenueOrderMetric user_revenue_order_metric = 44;
    selling_iface.v1.user_metric.v1.UserRevenueWarehouseAdjustmentMetric user_revenue_warehouse_adjustment_metric = 45;
    selling_iface.v1.user_metric.v1.UserRevenueProductAdjustmentMetric user_revenue_product_adjustment_metric = 46;
    selling_iface.v1.user_metric.v1.UserAdsExpenseMetric user_ads_expense_metric = 22;
  }
}

message UserMetricExtra {}

message UserStatMetricFilter {
  uint64 team_id = 1;
  common.v1.PageFilter page = 4;
  UserStatTimeRange range = 5 [(buf.validate.field).required = true];
}
message UserStatTimeRange {
  google.protobuf.Timestamp start = 1 [(buf.validate.field).required = true];
  google.protobuf.Timestamp end = 2 [(buf.validate.field).required = true];
}

message UserStatMetricRequest {
  UserStatMetricFilter filter = 1 [(buf.validate.field).required = true];
  UserMetricSort sort = 2 [(buf.validate.field).required = true];
  repeated UserMetricExtra metric_extras = 3;
  repeated UserMetricType metric_types = 4;
}

message UserStatMetricResponse {
  repeated UserMetric metrics = 1;
  repeated uint64 ids = 2;
}
