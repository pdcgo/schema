syntax = "proto3";
package user_iface.v2;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "role_base/v1/role.proto";

option go_package = "github.com/pdcgo/schema/services/user_iface/v2;user_iface";

service V2UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc SuspendUser(SuspendUserRequest) returns (SuspendUserResponse);
  rpc SearchUser(SearchUserRequest) returns (SearchUserResponse);
  rpc UserByIDs(UserByIDsRequest) returns (UserByIDsResponse);
  rpc UserList(UserListRequest) returns (UserListResponse);

  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  rpc TeamUserUpdate(TeamUserUpdateRequest) returns (TeamUserUpdateResponse);
  rpc TeamAccessList(TeamAccessListRequest) returns (TeamAccessListResponse);

  rpc TeamSynclegacy(TeamSynclegacyRequest) returns (stream TeamSynclegacyResponse);
}

enum TeamType {
  TEAM_TYPE_UNSPECIFIED = 0;
  TEAM_TYPE_WAREHOUSE = 1;
  TEAM_TYPE_SELLING = 2;
  TEAM_TYPE_ADMIN = 3;
}

message TeamAccessListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 user_id = 1;
}

message TeamAccessItem {
  uint64 team_id = 1;
  string team_name = 2;
  TeamType team_type = 3;
  string alias = 4;
  role_base.v1.Role role = 5;
}

message TeamAccessListResponse {
  repeated TeamAccessItem access = 1;
}

message UserAlias {
  uint64 team_id = 1;
  string alias = 2;
  role_base.v1.Role role = 3;
}

message UserInfo {
  uint64 id = 1;
  string email = 2;
  string username = 3;
  string phone_number = 5;
  string name = 6;
  UserStatus status = 7;
  string profile_picture = 9;
}

message UserMapItem {
  UserInfo user = 1;
  repeated UserAlias alias = 2;
}

message UserByIDsRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  repeated uint64 ids = 1;
  uint64 team_id = 2;
}

message UserByIDsResponse {
  map<uint64, UserMapItem> users = 1;
}

message TeamSynclegacyRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 team_id = 1;
}
message TeamSynclegacyResponse {}

message ResetPasswordRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message ResetPasswordResponse {}

message SearchUserItem {
  uint64 id = 1;
  string email = 2;
  string username = 3;
  string profile_picture = 7;
  string phone_number = 5;
  string name = 6;
}

message SearchUserByKeyword {
  string q = 1;
  uint64 team_id = 2;
}

message SearchUserByIds {
  repeated uint64 ids = 1;
}

message SearchUserRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  oneof filter {
    SearchUserByKeyword keyword = 1;
    SearchUserByIds ids = 2;
  }

  int64 page = 3;
  int64 page_size = 4;
}

message SearchUserResponse {
  repeated SearchUserItem users = 1;
}

message SuspendUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 user_id = 1;
}

message SuspendUserResponse {}

message UserListRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };
  uint64 team_id = 1 [(role_base.v1.use_scope) = true];
  string q = 2;
  role_base.v1.Role role = 3;
  common.v1.PageFilter page = 4 [(buf.validate.field).required = true];
}

message UserListResponse {
  repeated UserMapItem users = 1;
  common.v1.PageInfo page_info = 2;
}

message RemoveUser {
  uint64 user_id = 1;
}

message AddUser {
  uint64 user_id = 1;
  role_base.v1.Role role = 2;
  string alias = 3;
}

message CreateUser {
  string email = 1 [(buf.validate.field).string = {
    email: true
    max_len: 254
  }];
  string username = 2 [(buf.validate.field).string = {pattern: "^[a-zA-Z0-9_]{3,30}$"}];
  string password = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string phone_number = 5;
  role_base.v1.Role role = 6 [(buf.validate.field).required = true];
  string alias = 7;
}

message TeamUserUpdateRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [
    (role_base.v1.use_scope) = true,
    (buf.validate.field).uint64.gt = 0
  ];

  oneof action {
    AddUser add = 2;
    RemoveUser remove = 3;
    CreateUser create = 4;
  }
}

message TeamUserUpdateResponse {}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_SUSPENDED = 2;
}

message User {
  uint64 id = 1;
  string email = 2;
  string username = 3;
  string phone_number = 5;
  string name = 6;
  UserStatus status = 7;
  role_base.v1.Role role = 8;
  string profile_picture = 9;
}

message UpdateUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 id = 1;
  string email = 2;
  string username = 3;
  string phone_number = 5;
  string name = 6;
}

message DeleteUserResponse {}

message DeleteUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 id = 1;
}

message UpdateUserResponse {}

message CreateUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  string email = 1 [(buf.validate.field).string = {
    email: true
    max_len: 254
  }];
  string username = 2 [(buf.validate.field).string = {pattern: "^[a-zA-Z0-9_]{3,30}$"}];
  string password = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string phone_number = 5;
}

message CreateUserResponse {
  uint64 id = 1;
}
