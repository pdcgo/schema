syntax = "proto3";
package user_iface.v2;

import "buf/validate/validate.proto";
import "role_base/v1/role.proto";

option go_package = "github.com/pdcgo/schema/services/user_iface/v2;user_iface";

service V2UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc SuspendUser(SuspendUserRequest) returns (SuspendUserResponse);
  rpc SearchUser(SearchUserRequest) returns (SearchUserResponse);

  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  rpc TeamUserList(TeamUserListRequest) returns (TeamUserListResponse);
  rpc TeamUserUpdate(TeamUserUpdateRequest) returns (TeamUserUpdateResponse);

  rpc TeamSynclegacy(TeamSynclegacyRequest) returns (stream TeamSynclegacyResponse);
}

message TeamSynclegacyRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 team_id = 1;
}
message TeamSynclegacyResponse {}

message ResetPasswordRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message ResetPasswordResponse {}

message SearchUserItem {
  uint64 id = 1;
  string email = 2;
  string username = 3;
  string profile_picture = 7;
  string phone_number = 5;
  string name = 6;
}

message SearchUserByKeyword {
  string q = 1;
  uint64 team_id = 2;
}

message SearchUserByIds {
  repeated uint64 ids = 1;
}

message SearchUserRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  oneof filter {
    SearchUserByKeyword keyword = 1;
    SearchUserByIds ids = 2;
  }

  int64 page = 3;
  int64 page_size = 4;
}

message SearchUserResponse {
  repeated SearchUserItem users = 1;
}

message SuspendUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 user_id = 1;
}

message SuspendUserResponse {}

message TeamUserListRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };
  uint64 team_id = 1 [(role_base.v1.use_scope) = true];
  string q = 2;
  role_base.v1.Role role = 3;
}

message TeamUserListResponse {
  repeated User users = 1;
}

message RemoveUser {
  uint64 user_id = 1;
}

message AddUser {
  uint64 user_id = 1;
  role_base.v1.Role role = 2;
}

message TeamUserUpdateRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 team_id = 1 [(role_base.v1.use_scope) = true];

  oneof action {
    AddUser add = 2;
    RemoveUser remove = 3;
  }
}

message TeamUserUpdateResponse {}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_SUSPENDED = 2;
}

message User {
  uint64 id = 1;
  string email = 2;
  string username = 3;
  string phone_number = 5;
  string name = 6;
  UserStatus status = 7;
  role_base.v1.Role role = 8;
  string profile_picture = 9;
}

message UpdateUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  uint64 id = 1;
  string email = 2;
  string username = 3;
  string phone_number = 5;
  string name = 6;
}

message DeleteUserResponse {}

message DeleteUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 id = 1;
}

message UpdateUserResponse {}

message CreateUserRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN,
      ROLE_TEAM_OWNER,
      ROLE_TEAM_ADMIN
    ]
  };

  string email = 1 [(buf.validate.field).string = {
    email: true
    max_len: 254
  }];
  string username = 2 [(buf.validate.field).string = {pattern: "^[a-zA-Z0-9_]{3,30}$"}];
  string password = 3 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string phone_number = 5;
}

message CreateUserResponse {
  uint64 id = 1;
}
