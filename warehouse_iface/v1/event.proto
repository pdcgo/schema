syntax = "proto3";

package warehouse_iface.v1;

import "buf/validate/validate.proto";
import "event_base/v1/event.proto";
// import "common/v1/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pdcgo/schema/services/warehouse_iface/v1;warehouse_iface";

enum StockChangeType {
  STOCK_CHANGE_TYPE_UNSPECIFIED = 0;
  STOCK_CHANGE_TYPE_ORDER_ACCEPTED = 1;
  STOCK_CHANGE_TYPE_ORDER_CANCELED = 2;
  STOCK_CHANGE_TYPE_RESTOCK_ACCEPTED = 3;
  STOCK_CHANGE_TYPE_RETURN_ACCEPTED = 4;
  STOCK_CHANGE_TYPE_STOCK_PROBLEM = 5;
  STOCK_CHANGE_TYPE_STOCK_FOUND_BACK = 6;
  STOCK_CHANGE_TYPE_STOCK_ADJUSTMENT = 7;
  STOCK_CHANGE_TYPE_TRANSFER_WAREHOUSE_OUT = 8;
  STOCK_CHANGE_TYPE_TRANSFER_WAREHOUSE_IN = 9;
  STOCK_CHANGE_TYPE_TRANSFER_WAREHOUSE_OUT_CANCELED = 10;
  STOCK_CHANGE_TYPE_TRANSFER_WAREHOUSE_IN_CANCELED = 11;
}

message StockChangeLog {
  string sku_id = 1 [(buf.validate.field).string.min_len = 1];
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 actor_id = 3 [(buf.validate.field).uint64.gt = 0];
  uint64 transaction_id = 4 [(buf.validate.field).uint64.gt = 0];
  int32 change_count = 5 [(buf.validate.field).int32.not_in = 0];
  double change_amount = 6 [(buf.validate.field).double.not_in = 0];
  // @gotags: gorm:"serializer:timestamptz"
  google.protobuf.Timestamp transaction_at = 7 [(buf.validate.field).required = true];
  StockChangeType type = 8 [(buf.validate.field).enum.defined_only = true];
}

message StockChange {
  google.protobuf.Timestamp created_time = 1 [(buf.validate.field).required = true];
  repeated StockChangeLog changes = 2 [(buf.validate.field).repeated.min_items = 1];
}

message PendingStockChange {
  google.protobuf.Timestamp created_time = 1 [(buf.validate.field).required = true];
  repeated StockChangeLog changes = 2 [(buf.validate.field).repeated.min_items = 1];
}

message OrderAccepted {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message OrderCanceled {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message RestockAccepted {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message ReturnAccepted {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message StockProblem {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message StockFoundBack {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message StockAdjustment {
  uint64 transaction_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message TransferWarehouseCreated {
  uint64 transfer_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message TransferWarehouseAccepted {
  uint64 transfer_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message TransferWarehouseCanceled {
  uint64 transfer_id = 1 [(buf.validate.field).uint64.gt = 0];
}

message StockEvent {
  option (event_base.v1.event_config).event_topic = "stock-topic";

  oneof data {
    StockChange stock_change = 1;
    PendingStockChange pending_stock_change = 2;
    RestockAccepted restock_accepted = 3;
    ReturnAccepted return_accepted = 4;
    OrderAccepted order_accepted = 5;
    OrderCanceled order_canceled = 6;
    StockProblem stock_problem = 7;
    StockFoundBack stock_found_back = 8;
    StockAdjustment stock_adjustment = 9;
    TransferWarehouseCreated transfer_warehouse_created = 10;
    TransferWarehouseAccepted transfer_warehouse_accepted = 11;
    TransferWarehouseCanceled transfer_warehouse_canceled = 12;
  }
}
