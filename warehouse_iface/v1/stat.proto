syntax = "proto3";

package warehouse_iface.v1;

import "buf/validate/validate.proto";
// import "common/v1/common.proto";
// import "google/protobuf/timestamp.proto";
import "common/v1/stat.proto";

option go_package = "github.com/pdcgo/schema/services/warehouse_iface/v1;warehouse_iface";

enum MetricType {
  METRIC_TYPE_UNSPECIFIED = 0;
  METRIC_TYPE_PRODUCT_HISTORY_READY_STOCK = 1;
}

message ProductHistoryReadyStockMetric {
  uint64 product_id = 2;
  string sku = 3;
  string name = 4;
}

message Metric {
  oneof data {
    ProductHistoryReadyStockMetric product_history_ready_stock = 1;
  }
}

message StatFilter {
  uint64 team_id = 1;
  int32 top_n = 2;
  uint64 warehouse_id = 3;
}

message StatRequest {
  common.v1.StatTimeRange range = 1 [(buf.validate.field).required = true];
  StatFilter filter = 2;
  repeated MetricType metric_types = 3 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 10
    unique: true
  }];
}

message StatResponse {
  repeated Metric metrics = 1;
}
