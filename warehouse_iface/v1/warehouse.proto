syntax = "proto3";

package warehouse_iface.v1;

import "buf/validate/validate.proto";
import "common/v1/common.proto";
import "mcp_iface/v1/option.proto";
import "warehouse_iface/v1/stat.proto";
import "role_base/v1/role.proto";

option go_package = "github.com/pdcgo/schema/services/warehouse_iface/v1;warehouse_iface";

service WarehouseService {
  rpc WarehouseIDs(WarehouseIDsRequest) returns (WarehouseIDsResponse);
  rpc WarehouseList(WarehouseListRequest) returns (WarehouseListResponse);
  rpc WarehouseDetail(WarehouseDetailRequest) returns (WarehouseDetailResponse);

  // Warehouse management — admin team only.
  // Long-running task: streams progress (see docs long-running-task guideline).
  rpc WarehouseCreate(WarehouseCreateRequest) returns (stream WarehouseCreateResponse);
  rpc WarehouseUpdate(WarehouseUpdateRequest) returns (WarehouseUpdateResponse);
  rpc WarehouseDelete(WarehouseDeleteRequest) returns (WarehouseDeleteResponse);

  rpc TeamWarehouseReturnInfo(TeamWarehouseReturnInfoRequest) returns (TeamWarehouseReturnInfoResponse) {
    option (mcp_iface.v1.include) = true;
  }

  rpc TransactionNoteCreate(TransactionNoteCreateRequest) returns (TransactionNoteCreateResponse);
  rpc TransactionNoteList(TransactionNoteListRequest) returns (TransactionNoteListResponse) {
    option (mcp_iface.v1.include) = true;
  }

  rpc SellingTeamList(SellingTeamListRequest) returns (SellingTeamListResponse) {
    option (mcp_iface.v1.include) = true;
  }
  // potensi ruweettttttttt
  rpc TeamRackList(TeamRackListRequest) returns (TeamRackListResponse) {
    option (mcp_iface.v1.include) = true;
  }

  // inbound rpc

  //stat rpc
  rpc Stat(StatRequest) returns (StatResponse);
}

enum TransactionNoteType {
  TRANSACTION_NOTE_TYPE_UNSPECIFIED = 0;
  TRANSACTION_NOTE_TYPE_COMMON = 1;
  TRANSACTION_NOTE_TYPE_RETURN = 2;
  TRANSACTION_NOTE_TYPE_CANCEL = 3;
  TRANSACTION_NOTE_TYPE_BROKEN = 4;
  TRANSACTION_NOTE_TYPE_PROBLEM = 5;
}

message Rack {
  uint64 id = 1;
  string name = 3;
  int32 count = 4;
}

message TeamRackListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 warehouse_id = 1 [(buf.validate.field).uint64.gt = 0];
  repeated uint64 team_ids = 2 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 200
    items: {
      uint64: {gt: 0}
    }
  }];
  string q = 3;
}

message TeamRackListResponse {
  repeated Rack list = 1;
}

message SellingTeamListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  string q = 1;
  uint64 warehouse_id = 2 [(buf.validate.field).uint64.gt = 0];
  common.v1.PageFilter page = 3;
}

message SellingTeamListResponse {
  repeated common.v1.Team list = 1;
  common.v1.PageInfo page_info = 2;
}

message Note {
  TransactionNoteType type = 5;
  string note_text = 6;
}

message TransactionNoteCreateRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 tx_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 team_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 order_id = 3;

  repeated Note notes = 4 [(buf.validate.field).repeated = {max_items: 5}];
}

message TransactionNoteCreateResponse {
  repeated uint64 ids = 1;
}

message TransactionNoteListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 tx_id = 1 [(buf.validate.field).uint64.gt = 0];
  uint64 team_id = 2 [(buf.validate.field).uint64.gt = 0];
  uint64 order_id = 3;
}
message TransactionNoteListResponse {
  repeated Note list = 1;
}

message Warehouse {
  uint64 id = 1;
  string name = 2;
  string desc = 3;
  string address = 4;
}

message WarehouseIDsRequest {
  // Public id lookup — no auth required.
  option (role_base.v1.request_policy) = {allow_all: true};

  repeated uint64 ids = 1 [(buf.validate.field).repeated = {
    min_items: 1 // must have at least 1 id
    max_items: 200
    unique: true // no duplicate IDs allowed
    items: {
      uint64: {gt: 0}
    }
  }];
}

message WarehouseIDsResponse {
  map<uint64, Warehouse> data = 1;
}

message WarehouseListRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  string q = 1;
}

message WarehouseListResponse {
  repeated Warehouse list = 1;
}

// Rich, read-only warehouse detail (management form + detail page).
message WarehouseDetail {
  uint64 id = 1;
  string name = 2;
  string desc = 3;
  string address = 4;

  bool is_full = 5;
  bool is_closed = 6;

  bool use_fixed_fee = 7;
  double fee_fix = 8;
  float fee_percent = 9;
  double max_fee = 10;

  // Time-of-day, "HH:MM" (empty = unset).
  string open_time = 11;
  string close_time = 12;
  string close_order = 13;

  // read-only stats
  uint64 rack_count = 14;
  uint64 order_count = 15;
  uint64 capacity = 16;
  uint64 max_capacity = 17;
  uint64 product_count = 18;
}

message WarehouseDetailRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}
message WarehouseDetailResponse {
  WarehouseDetail data = 1;
}

message WarehouseCreateRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  // Code for the warehouse team created for this warehouse (uppercased server-side;
  // must be unique). The warehouse id is server-assigned (= the new team's id).
  string team_code = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 6
  }];
  string name = 2 [(buf.validate.field).string = {min_len: 1}];
  string desc = 3;
  string address = 4;

  bool is_full = 5;
  bool is_closed = 6;

  bool use_fixed_fee = 7;
  double fee_fix = 8;
  float fee_percent = 9;
  double max_fee = 10;

  string open_time = 11;
  string close_time = 12;
  string close_order = 13;
}
message WarehouseCreateResponse {
  // Set on the final message: the created warehouse/team id.
  uint64 id = 1;
  // Progress line for the long-running create task.
  string message = 2;
}

message WarehouseUpdateRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
  string name = 2 [(buf.validate.field).string = {min_len: 1}];
  string desc = 3;
  string address = 4;

  bool is_full = 5;
  bool is_closed = 6;

  bool use_fixed_fee = 7;
  double fee_fix = 8;
  float fee_percent = 9;
  double max_fee = 10;

  string open_time = 11;
  string close_time = 12;
  string close_order = 13;
}
message WarehouseUpdateResponse {}

message WarehouseDeleteRequest {
  option (role_base.v1.request_policy) = {
    roles: [
      ROLE_ROOT,
      ROLE_ADMIN
    ]
  };

  uint64 id = 1 [(buf.validate.field).uint64.gt = 0];
}
message WarehouseDeleteResponse {}

message TeamWarehouseReturnInfoRequest {
  option (role_base.v1.request_policy) = {allow_only_authenticated: true};

  uint64 team_id = 1;
}

message TeamWarehouseReturnInfoResponse {
  Warehouse warehouse_return = 1;
  common.v1.User user_return = 2;
}
